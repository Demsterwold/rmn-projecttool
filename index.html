<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMN Projecttool</title>
<style>
  :root {
    --bg: #14161a; --panel: #1c1f25; --panel-hover: #22262e; --border: #2b2f38;
    --text: #e8e6e0; --text-dim: #8b8f99; --text-faint: #565b66;
    --accent: #5b8def; --red: #d9534f; --orange: #e0a63a; --green: #4caf7d;
    --c-productie: #7fd99a; --c-marketing: #e8b169; --c-distributie: #7fb8e8; --c-taken: #b89ae0;
    --radius: 10px; --mono: 'SF Mono','IBM Plex Mono',Consolas,monospace; --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; max-width: 100%; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px 80px; }
  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin: 0; font-family: var(--mono); cursor: pointer; user-select: none; }
  header h1:hover { opacity: 0.8; }
  header h1 span { color: var(--text-faint); font-weight: 400; }
  .header-actions { display: flex; gap: 10px; }
  button { font-family: var(--sans); font-size: 13px; font-weight: 600; border-radius: 7px; border: 1px solid var(--border); cursor: pointer; padding: 8px 14px; background: var(--panel); color: var(--text); transition: background 0.15s, border-color 0.15s; }
  button:hover { background: var(--panel-hover); border-color: #3a3f4a; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #0c1220; }
  button.primary:hover { filter: brightness(1.08); }
  button.primary:disabled { filter: none; opacity: 0.5; cursor: default; }
  button.ghost { background: transparent; border-color: transparent; color: var(--text-dim); padding: 6px 8px; }
  .auth-btn { font-size: 12px; opacity: 0.45; }
  .auth-btn:hover { opacity: 0.8; }
  button.icon { padding: 5px 9px; font-size: 13px; }
  button.small { padding: 5px 10px; font-size: 12px; }
  button:disabled { opacity: 0.5; cursor: default; }
  .state-msg { color: var(--text-dim); font-size: 13px; padding: 40px 0; text-align: center; }
  .state-msg button { margin-top: 10px; }

  .cal-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-title { font-size: 22px; font-weight: 700; }
  .cal-nav { display: flex; gap: 8px; }
  .cal-grid { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
  .cal-weekdays div { padding: 8px; text-align: center; font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .cal-weeks { display: flex; flex-direction: column; }
  .cal-week-wrap { border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .cal-week-wrap:last-child { border-bottom: none; }
  .cal-daynum-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-daynum-cell { border-right: 1px solid var(--border); padding: 6px 6px 0; }
  .cal-daynum-cell:last-child { border-right: none; }
  .cal-daynum-cell.other-month { opacity: 0.3; }
  .cal-daynum { font-size: 12px; color: var(--text-dim); font-family: var(--mono); }
  .cal-daynum-cell.today .cal-daynum { background: var(--red); color: #fff; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; }
  .cal-band-grid { display: grid; grid-template-columns: repeat(7, 1fr); margin-top: 3px; }
  .cal-band { grid-row: 1; font-size: 9px; padding: 1px 6px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; font-weight: 600; line-height: 1.3; }
  .cal-single-grid { display: grid; grid-template-columns: repeat(7, 1fr); margin-top: 2px; }
  .cal-single-cell { padding: 0 6px; display: flex; flex-direction: column; gap: 2px; }
  .cal-chip { font-size: 10px; padding: 2px 5px; border-radius: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; color: #0c1220; font-weight: 600; }
  .year-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  @media (max-width: 700px) { .year-grid { grid-template-columns: repeat(2, 1fr); } }
  .year-month-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; min-height: 110px; }
  .year-month-card.current { border-color: var(--accent); }
  .year-month-label { font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .year-month-pills { display: flex; flex-direction: column; gap: 3px; }
  .year-month-empty { font-size: 11px; color: var(--text-faint); }

  .proj-list { margin-top: 28px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .proj-list h3 { margin: 0; padding: 14px 18px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); border-bottom: 1px solid var(--border); }
  .proj-row { display: grid; grid-template-columns: auto 1fr auto auto auto auto; gap: 16px; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; }
  .proj-row:last-child { border-bottom: none; }
  .proj-row:hover { background: var(--panel-hover); }
  .proj-row .dot { width: 9px; height: 9px; border-radius: 50%; }
  .proj-row .p-name { font-weight: 600; }
  .proj-row .p-period { color: var(--text-dim); font-family: var(--mono); font-size: 12px; }
  .proj-row .p-status { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
  .status-in_productie { background: rgba(91,141,239,0.15); color: var(--accent); }
  .status-live { background: rgba(76,175,125,0.15); color: var(--green); }
  .p-countdown { font-family: var(--mono); font-size: 12px; color: var(--text-dim); white-space: nowrap; text-align: right; }
  .p-countdown.soon { color: var(--orange); font-weight: 700; }
  .p-countdown.overdue { color: var(--red); font-weight: 700; }
  .proj-row-delete { opacity: 0; border: none; background: none; color: var(--text-faint); font-size: 15px; padding: 2px 6px; }
  .proj-row:hover .proj-row-delete { opacity: 1; }
  .proj-row-delete:hover { color: var(--red); }

  .tl-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
  .tl-zoom { display: flex; gap: 2px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 2px; }
  .tl-zoom button { border: none; background: transparent; padding: 5px 12px; font-size: 12px; border-radius: 6px; }
  .tl-zoom button.active { background: var(--accent); color: #0c1220; }
  .tl-nav { display: flex; align-items: center; gap: 8px; }
  .tl-nav .tl-label { font-size: 13px; font-family: var(--mono); color: var(--text-dim); min-width: 140px; text-align: center; }
  .timeline { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .tl-header { display: flex; border-bottom: 1px solid var(--border); }
  .tl-header-spacer { width: 140px; flex-shrink: 0; border-right: 1px solid var(--border); }
  .tl-header-cols { flex: 1; display: flex; position: relative; }
  .tl-col-label { flex: 1; text-align: center; font-size: 10px; color: var(--text-faint); padding: 8px 2px; font-family: var(--mono); border-right: 1px solid rgba(255,255,255,0.03); white-space: nowrap; overflow: hidden; }
  .tl-body { position: relative; }
  .tl-row { display: flex; align-items: center; min-height: 44px; border-bottom: 1px solid var(--border); }
  .tl-row:last-child { border-bottom: none; }
  .tl-row-label { width: 140px; flex-shrink: 0; padding: 8px 12px; border-right: 1px solid var(--border); cursor: pointer; }
  .tl-proj-name { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .tl-color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .tl-row-track { flex: 1; position: relative; height: 44px; }
  .tl-bar { position: absolute; top: 13px; height: 18px; border-radius: 5px; opacity: 0.9; display: flex; align-items: center; padding: 0 8px; overflow: hidden; }
  .tl-bar-label { font-size: 10px; font-weight: 600; color: #0c1220; white-space: nowrap; }
  .tl-outside { font-size: 11px; color: var(--text-faint); padding: 0 12px; }
  .tl-today { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--red); z-index: 5; }
  .tl-marker { position: absolute; top: 3px; width: 8px; height: 8px; border-radius: 50%; border: 2px solid var(--bg); transform: translateX(-50%); cursor: help; }

  .detail-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; justify-content: space-between; }
  .detail-header-left { display: flex; align-items: center; gap: 12px; }
  .back-btn { font-family: var(--mono); font-size: 12px; }
  .detail-title-row { display: flex; align-items: center; gap: 8px; }
  .detail-title { font-size: 22px; font-weight: 700; margin: 0; }
  .detail-sub { font-size: 12px; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; }
  .edit-project-btn { font-size: 13px; opacity: 0.5; }
  .edit-project-btn:hover { opacity: 1; }
  .share-project-btn { font-size: 12px; font-weight: 600; opacity: 1; display: inline-flex; align-items: center; gap: 5px; }
  .share-link-box { display: flex; gap: 8px; margin-top: 6px; }
  .share-link-box input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 7px; color: var(--text-dim); padding: 8px 10px; font-size: 12px; font-family: var(--mono); }
  .countdown-badge { font-family: var(--mono); font-size: 12px; color: #c97a78; background: var(--panel); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; white-space: nowrap; }
  .detail-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .live-toggle-btn { font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 20px; }
  .live-toggle-btn.is-live { background: rgba(76,175,125,0.15); border-color: var(--green); color: var(--green); }
  .countdown-badge.soon { color: var(--orange); border-color: var(--orange); }
  .countdown-badge.overdue { color: var(--red); border-color: var(--red); }

  .tracks { display: flex; align-items: flex-start; gap: 16px; margin: 24px 0 28px; position: relative; }
  .tracks.single .tracks-lists { columns: 1; max-width: 460px; }
  .tracks-lists { columns: 260px; column-gap: 16px; flex: 1; min-width: 0; }
  .tracks-files { width: 280px; flex-shrink: 0; }
  @media (max-width: 800px) { .tracks { flex-direction: column; } .tracks-files { width: 100%; } }
  .track-col { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; break-inside: avoid; margin-bottom: 16px; }
  .track-col[draggable="true"] .track-head { cursor: grab; }
  .track-col.dragging { opacity: 0.4; }
  .track-col.drag-over { outline: 2px solid var(--accent); outline-offset: -2px; }
  .add-track-btn { position: sticky; top: 12px; flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); background: var(--panel); color: var(--text-faint); font-size: 15px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .add-track-btn:hover { color: var(--text); border-color: var(--accent); }
  .track-head { padding: 12px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .track-head-left { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .p-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .track-start-edit { font-size: 10px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-faint); cursor: pointer; background: none; border: none; padding: 0; }
  .track-start-edit:hover { color: var(--text); }

  .step-list { display: flex; flex-direction: column; }
  .step { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: flex-start; gap: 8px; cursor: grab; position: relative; overflow: hidden; }
  .step.dragging { opacity: 0.4; }
  .step.drag-over { border-top: 2px solid var(--accent); }

  /* Bestanden-paneel */
  .file-list { display: flex; flex-direction: column; }
  .file-row { padding: 9px 12px; border-bottom: 1px solid var(--border); font-size: 12px; display: flex; align-items: center; gap: 8px; }
  .file-row:last-child { border-bottom: none; }
  .file-row-main { flex: 1; min-width: 0; }
  .file-row-name { cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-row-name:hover { color: var(--accent); }
  .file-row-meta { font-size: 10px; color: var(--text-faint); margin-top: 2px; }
  .file-row-delete { border: none; background: none; color: var(--text-faint); font-size: 14px; padding: 2px 4px; cursor: pointer; flex-shrink: 0; }
  .file-row-delete:hover { color: var(--red); }
  .file-empty { padding: 14px 16px; font-size: 12px; color: var(--text-faint); }
  .file-drop-row { padding: 10px 12px; }
  .file-drop-label { display: block; border: 1.5px dashed var(--border); border-radius: 8px; padding: 10px; text-align: center; font-size: 11px; color: var(--text-faint); cursor: pointer; }
  .file-drop-label:hover, .file-drop-label.drag-active { border-color: var(--accent); color: var(--accent); }
  .file-drop-label input[type="file"] { display: none; }
  .file-viewer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; flex-direction: column; }
  .file-viewer-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
  .file-viewer-bar button { font-size: 13px; }
  .file-viewer-frame { flex: 1; border: none; background: #fff; }

  /* Uitschuifpaneel per taak (verschijnt alleen bij hoveren over de rechterrand) */
  .step-hover-zone { position: absolute; top: 0; right: 0; bottom: 0; width: 24px; z-index: 1; }
  .step-slide-panel { position: absolute; top: 0; right: 0; bottom: 0; display: flex; align-items: center; gap: 2px; padding: 0 6px; background: linear-gradient(to right, transparent, var(--panel) 22%); transform: translateX(100%); transition: transform 0.16s ease; z-index: 2; }
  .step-hover-zone:hover ~ .step-slide-panel, .step-slide-panel:hover { transform: translateX(0); }
  .step-slide-panel button { border: none; background: transparent; padding: 3px 5px; font-size: 12px; color: var(--text-faint); }
  .step-slide-panel button:hover { color: var(--text); }
  .step-slide-panel button.has-link { color: var(--accent); }
  .step-link-chip { font-size: 10px; color: var(--accent); text-decoration: none; margin-top: 2px; display: inline-block; }
  .step:hover .step-actions { opacity: 1; }
  .step:last-child { border-bottom: none; }
  .step-check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--text-faint); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.12s; }
  .step.done .step-check { background: var(--green); border-color: var(--green); color: #0c1220; }
  .step:not(.done).prio-rood { box-shadow: inset 0 0 16px 1px rgba(226,88,90,0.5); background: rgba(226,88,90,0.06); }
  .step:not(.done).prio-oranje { box-shadow: inset 0 0 16px 1px rgba(224,166,58,0.5); background: rgba(224,166,58,0.06); }
  .step:not(.done).prio-groen { box-shadow: inset 0 0 16px 1px rgba(76,175,125,0.5); background: rgba(76,175,125,0.06); }
  .step.active .step-check:hover { border-color: var(--text); }
  .step.locked { opacity: 0.4; }
  .step.locked .step-check { cursor: default; }
  .step-main { flex: 1; min-width: 0; }
  .step-name { line-height: 1.4; }
  .step-name[contenteditable="true"] { outline: 1px dashed var(--accent); border-radius: 3px; padding: 0 2px; }
  .step.done .step-name { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--text-faint); }
  .step-due { font-size: 10px; color: var(--text-faint); font-family: var(--mono); white-space: nowrap; margin-top: 1px; }
  .step-note-text { font-size: 11px; color: var(--text-dim); margin-top: 3px; font-style: italic; cursor: pointer; }
  .step-note-input { width: 100%; margin-top: 4px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 5px 7px; font-size: 12px; font-family: var(--sans); resize: vertical; }
  .step-actions { opacity: 0; display: flex; gap: 2px; flex-shrink: 0; transition: opacity 0.1s; }
  .step-actions button { padding: 2px 5px; font-size: 11px; border: none; background: transparent; color: var(--text-faint); }
  .step-actions button.has-note { color: var(--orange); }
  .step-actions button:hover { color: var(--text); }
  .add-step-row { padding: 8px 12px; display: flex; gap: 6px; }
  .add-step-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 8px; font-size: 12px; }
  .step.done { opacity: 0.55; }
  .step { transition: opacity 0.22s ease, transform 0.22s ease; }
  .step.fading { opacity: 0 !important; transform: translateY(6px); }
  .subtask-list { margin-top: 5px; display: flex; flex-direction: column; gap: 3px; }
  .subtask { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .subtask-check { width: 13px; height: 13px; border-radius: 3px; border: 1.5px solid var(--text-faint); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; }
  .subtask.done .subtask-check { background: var(--green); border-color: var(--green); color: #0c1220; }
  .subtask.done .subtask-text { color: var(--text-faint); text-decoration: line-through; }
  .subtask-text { flex: 1; cursor: pointer; }
  .subtask-del { border: none; background: none; color: var(--text-faint); font-size: 11px; padding: 0 3px; cursor: pointer; }
  .subtask-del:hover { color: var(--text); }
  .subtask-add-row { display: flex; gap: 4px; margin-top: 4px; }
  .subtask-add-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 3px 6px; font-size: 11px; }
  .step-thumbs { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .step-thumb { position: relative; width: 44px; height: 44px; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
  .step-thumb img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; display: block; }
  .step-thumb-del { position: absolute; top: 0; right: 0; background: rgba(0,0,0,0.6); color: #fff; border: none; font-size: 10px; width: 15px; height: 15px; line-height: 15px; padding: 0; cursor: pointer; opacity: 0; }
  .step-thumb:hover .step-thumb-del { opacity: 1; }
  .project-concept { margin: 18px 0; }
  .project-concept textarea { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 12px 14px; font-size: 13px; font-family: var(--sans); resize: vertical; min-height: 60px; box-shadow: 0 1px 2px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.18); }
  .project-concept label { display: block; font-size: 11px; color: var(--text-faint); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .meeting-section { margin: 18px 0; }
  .rec-btn-wrap { display: flex; align-items: center; gap: 8px; }
  .rec-timer-label { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--green); }
  .rec-btn { width: 50px; height: 50px; border-radius: 50%; background: #d9484a; color: #fff; font-weight: 800; font-size: 11px; font-family: var(--mono); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(217,72,74,0.5); flex-shrink: 0; }
  .rec-btn:hover { background: #f2585a; }
  .rec-btn.recording { background: var(--green); box-shadow: 0 2px 8px rgba(76,175,125,0.5); animation: recPulse 1.4s infinite; }
  .rec-btn.recording:hover { background: #5cc98f; }
  @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(76,175,125,0.55); } 50% { box-shadow: 0 0 0 9px rgba(76,175,125,0); } }
  .rec-waveform { display: flex; align-items: center; gap: 2px; height: 16px; }
  .rec-waveform span { width: 3px; background: #fff; border-radius: 2px; height: 4px; animation: waveBounce 0.9s infinite ease-in-out; }
  .rec-waveform span:nth-child(1) { animation-delay: 0s; }
  .rec-waveform span:nth-child(2) { animation-delay: 0.15s; }
  .rec-waveform span:nth-child(3) { animation-delay: 0.3s; }
  .rec-waveform span:nth-child(4) { animation-delay: 0.45s; }
  @keyframes waveBounce { 0%,100% { height: 3px; } 50% { height: 15px; } }
  .detail-tabs { display: flex; gap: 6px; margin: 18px 0 4px; border-bottom: 1px solid var(--border); }

async function handleAuthClick() {
  if (isOwner) {
    if (!confirm('Uitloggen op dit apparaat?')) return;
    await authClient.auth.signOut();
    isOwner = false; updateAuthUI();
    return;
  }
  try {
    const { data, error } = await authClient.auth.signInWithPasskey();
    if (error) throw error;
    isOwner = true; updateAuthUI();
  } catch (err) {
    showPasskeySetupModal();
  }
}
function showPasskeySetupModal() {
  renderModal(`
    <h2>Face ID / Touch ID instellen</h2>
    <div class="hint">Nog geen Face ID/Touch ID geregistreerd op dit apparaat voor dit account. Log eenmalig in met het wachtwoord dat je apart hebt gekregen, en registreer daarna je Face ID/Touch ID. Daarna heb je dit wachtwoord nooit meer nodig.</div>
    <div class="field"><label>E-mail</label><input type="text" id="setupEmail" value="${OWNER_EMAIL}" readonly></div>
    <div class="field"><label>Eenmalig wachtwoord</label><input type="password" id="setupPassword" placeholder="wachtwoord"></div>
    <div class="modal-actions"><button class="ghost" id="modalCancel">Annuleren</button><button class="primary" id="modalSetup">Face ID/Touch ID registreren</button></div>
  `);
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalSetup').onclick = async () => {
    const btn = document.getElementById('modalSetup');
    btn.disabled = true; btn.textContent = 'Bezig...';
    try {
      const password = document.getElementById('setupPassword').value;
      const { error: signInErr } = await authClient.auth.signInWithPassword({ email: OWNER_EMAIL, password });
      if (signInErr) throw signInErr;
      const { error: regErr } = await authClient.auth.registerPasskey();
      if (regErr) throw regErr;
      isOwner = true; updateAuthUI(); closeModal();
      alert('Gelukt! Vanaf nu ontgrendel je met Face ID/Touch ID via het slotje rechtsboven — dit wachtwoord heb je niet meer nodig.');
    } catch (err) {
      btn.disabled = false; btn.textContent = 'Face ID/Touch ID registreren';
      alert('Mislukt: ' + err.message);
    }
  };
}

function getConfig() {
  return { url: localStorage.getItem('pt_sb_url') || DEFAULT_URL, key: localStorage.getItem('pt_sb_key') || DEFAULT_KEY };
}
function setConfig(url, key) { localStorage.setItem('pt_sb_url', url); localStorage.setItem('pt_sb_key', key); }

async function getAuthToken() {
  const { key } = getConfig();
  try {
    const { data } = await authClient.auth.getSession();
    if (data.session) return data.session.access_token;
  } catch (e) { /* not signed in */ }
  return key;
}
async function sb(method, path, body, prefer) {
  const { url, key } = getConfig();
  const authToken = await getAuthToken();
  const headers = { apikey: key, Authorization: 'Bearer ' + authToken };
  if (body !== undefined) headers['Content-Type'] = 'application/json';
  if (prefer) headers['Prefer'] = prefer;
  const res = await fetch(url + '/rest/v1/' + path, { method, headers, body: body !== undefined ? JSON.stringify(body) : undefined });
  if (!res.ok) { const t = await res.text(); throw new Error('Supabase-fout (' + res.status + '): ' + t.slice(0,200)); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}
const sbSelect = (table, query) => sb('GET', table + (query ? '?' + query : ''));
const sbInsert = (table, rows) => sb('POST', table, rows, 'return=representation');
const sbUpdate = (table, filter, patch) => sb('PATCH', table + '?' + filter, patch, 'return=representation');
const sbDelete = (table, filter) => sb('DELETE', table + '?' + filter);

function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function sortForDisplay(list) { return list.slice().sort((a,b) => (a.status==='done')-(b.status==='done') || a.order_num-b.order_num); }
function statusLabel(s) { if (s === 'in_productie') return 'In productie'; if (s === 'live') return 'Live'; return s; }
function uid(prefix) { return prefix + '_' + Date.now() + '_' + Math.floor(Math.random()*10000); }

function parseDutchDate(str) {
  if (!str) return null;
  const m = str.trim().match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if (!m) return null;
  const day = Number(m[1]), month = Number(m[2]), year = Number(m[3]);
  const d = new Date(year, month - 1, day);
  if (d.getFullYear() !== year || d.getMonth() !== month - 1 || d.getDate() !== day) return null;
  return d;
}
function toIso(d) { return d ? d.toISOString() : null; }
function isoToDutch(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return String(d.getDate()).padStart(2,'0') + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + d.getFullYear();
}
function todayDutch() { return isoToDutch(new Date().toISOString()); }
function dutchToNative(dutch) {
  const d = parseDutchDate(dutch);
  if (!d) return '';
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function dateFieldHtml(id, label, valueDutch) {
  return `<div class="field"><label>${label}</label><div class="date-input-row">
    <input type="text" id="${id}" value="${valueDutch}" placeholder="DD-MM-JJJJ">
    <input type="date" id="${id}_native" class="native-date-hidden" value="${dutchToNative(valueDutch)}" onchange="syncDutchFromNative('${id}')">
    <button type="button" class="date-pick-btn" onclick="openDatePicker('${id}')">\u{1F4C5}</button>
  </div></div>`;
}
function openDatePicker(id) {
  const el = document.getElementById(id + '_native');
  if (el.showPicker) el.showPicker(); else el.click();
}
function syncDutchFromNative(id) {
  const native = document.getElementById(id + '_native').value;
  if (!native) return;
  const [y,m,d] = native.split('-');
  document.getElementById(id).value = d + '-' + m + '-' + y;
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
}
function daysUntil(iso) {
  if (!iso) return null;
  const target = new Date(iso); target.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}
function countdownLabel(iso) {
  const n = daysUntil(iso);
  if (n === null) return {text: 'geen datum', cls: ''};
  if (n < 0) return {text: Math.abs(n) + ' dagen geleden', cls: 'overdue'};
  if (n === 0) return {text: 'vandaag!', cls: 'soon'};
  if (n <= 14) return {text: 'nog ' + n + ' dagen', cls: 'soon'};
  return {text: 'nog ' + n + ' dagen', cls: ''};
}

function templateRows() {
  const productie = ["Concepting","Script/opzet pilot","Opname eerste 2 afleveringen","Edit & afronding eerste 2 afleveringen","Logo design","Feedback redactie","Lancering"];
  const marketing = ["Huidige podcastcijfers verzamelen (nulmeting)","Doelgroep bepalen","Groeidoelstelling vaststellen (KPI's per platform)","Funnelstructuur uitwerken (awareness & retargeting)","Contentplan opstellen (snippets, quotes, promo)","Promo content opnemen","Snippets & social content produceren","Funnel opzetten in Ads Manager","Advertentie-assets voorbereiden","Tracking & UTM's instellen","Campagne live zetten","Evaluatie na 1 week","Evaluatie na 1 maand"];
  const distributie = ["Check: RSS-feed aangemaakt in Springcast","Check: gekoppeld aan Spotify","Check: gekoppeld aan Apple Podcasts","Check: geupload op YouTube","Check: gepubliceerd via Blue Billywig","Check: toegevoegd aan Mijn Magazines app","Check: podcastpagina live op website","Check: SEO-titel & meta description geschreven","Check: shownotes geschreven","Check: transcript/artikel gemaakt","Check: trailer geproduceerd","Check: social quote-video's klaar","Check: teaser video klaar","Check: poster/canvas/banners klaar","Check: homepage-promotie geregeld","Check: social kanalen gepland (IG/FB/LI/TikTok/YouTube)","Check: nieuwsbrief-vermelding geregeld","Check: print-vermelding gepland","Check: Meta-campagne + pre-rolls live","Check: PR-plan/pitches lopen","Check: launch-planning + tracking (UTM) compleet","Check: evaluatie 1 week na launch","Check: evaluatie 1 maand na launch"];
  const rows = [];
  productie.forEach((n,i) => rows.push({track:'productie', order_num:i+1, step_name:n, is_check:false}));
  marketing.forEach((n,i) => rows.push({track:'marketing', order_num:i+1, step_name:n, is_check:false}));

// ================= Business logic =================
async function createProject(name, frequency, color, startD, launchD, type) {
  if (!requireOwner()) return;
  const id = uid('proj');
  await sbInsert('projects', [{ id, name, status: 'in_productie', type, frequency: frequency||'', color, start_date: toIso(startD), launch_date: toIso(launchD) }]);
  if (type === 'podcast') {
    const tpl = templateRows();
    const rows = tpl.map(t => ({
      id: id + '_' + t.track + '_' + t.order_num, project_id: id, track: t.track, order_num: t.order_num,
      step_name: t.step_name, is_check: t.is_check, status: 'pending', subtasks: []
    }));
    await sbInsert('project_steps', rows);
  }
  return id;
}

async function markStepDone(projectId, track, orderNum) {
  const stepId = projectId + '_' + track + '_' + orderNum;
  await sbUpdate('project_steps', 'id=eq.' + stepId, { status: 'done', completed_date: new Date().toISOString(), reminder_pending: false });

  if (track === 'productie' && orderNum === 4) {
    const proj = (await sbSelect('projects', 'id=eq.' + projectId + '&select=*'))[0];
    const now = new Date().toISOString();
    const patch = { marketing_unlocked: true, distributie_unlocked: true };
    if (!proj.marketing_start_date) patch.marketing_start_date = now;
    if (!proj.distributie_start_date) patch.distributie_start_date = now;
    await sbUpdate('projects', 'id=eq.' + projectId, patch);
  }
}

async function toggleLiveStatus(projectId, currentStatus) {
  if (!requireOwner()) return;
  const goingLive = currentStatus !== 'live';
  await sbUpdate('projects', 'id=eq.' + projectId, { status: goingLive ? 'live' : 'in_productie' });
  if (goingLive) {
    const existingBm = await sbSelect('benchmark_checks', 'project_id=eq.' + projectId + '&select=id&limit=1');
    if (!existingBm.length) {
      const dueDate = new Date(Date.now() + 28*86400000).toISOString();
      await sbInsert('benchmark_checks', [{ id: uid('bm'), project_id: projectId, week_number: 4, due_date: dueDate, status: 'pending', reminder_pending: true }]);
    }
  }
  refreshProjectView(projectId);
}

async function addToLiveShows(projectId) {
  if (!requireOwner()) return;
  const proj = (await sbSelect('projects', 'id=eq.' + projectId + '&select=name,spotify_url,apple_url,youtube_url'))[0];
  if (!proj) return;
  const existing = await sbSelect('live_shows', 'name=eq.' + encodeURIComponent(proj.name) + '&select=id');
  if (existing.length) { alert('"' + proj.name + '" staat al bij Lopende podcasts.'); return; }
  await sbInsert('live_shows', [{ id: uid('show'), name: proj.name, spotify_url: proj.spotify_url, apple_url: proj.apple_url, youtube_url: proj.youtube_url }]);
  alert('"' + proj.name + '" is toegevoegd aan Lopende podcasts.');
}

async function addStep(projectId, track, stepName, fromMeeting) {
  if (!requireOwner()) return;
  const steps = await sbSelect('project_steps', 'project_id=eq.' + projectId + '&track=eq.' + track + '&select=order_num&order=order_num.desc&limit=1');
  const maxOrder = steps.length ? steps[0].order_num : 0;
  const newOrder = maxOrder + 1;
  const rows = await sbInsert('project_steps', [{ id: projectId + '_' + track + '_' + newOrder, project_id: projectId, track, order_num: newOrder, step_name: stepName, status: 'pending', subtasks: [], from_meeting: !!fromMeeting }]);
  return rows[0];
}

async function deleteStep(stepId) {
  if (!requireOwner()) return;
  const step = (await sbSelect('project_steps', 'id=eq.' + stepId + '&select=*'))[0];
  if (!step) return;
  await sbDelete('project_steps', 'id=eq.' + stepId);
  await renumberTrack(step.project_id, step.track);
}

async function renumberTrack(projectId, track) {
  const rows = await sbSelect('project_steps', 'project_id=eq.' + projectId + '&track=eq.' + track + '&select=*&order=order_num.asc');
  for (let i = 0; i < rows.length; i++) {
    const newOrder = i + 1;
    const newId = projectId + '_' + track + '_' + newOrder;
    if (rows[i].order_num !== newOrder || rows[i].id !== newId) {
      await sbUpdate('project_steps', 'id=eq.' + rows[i].id, { order_num: newOrder, id: newId });
    }
  }
}
async function reorderSteps(projectId, track, orderedIds) {
  // two-phase rename to avoid id collisions
  for (let i = 0; i < orderedIds.length; i++) {
    await sbUpdate('project_steps', 'id=eq.' + orderedIds[i], { id: 'tmp_' + i + '_' + orderedIds[i] });
  }
  for (let i = 0; i < orderedIds.length; i++) {
    const newOrder = i + 1;
    await sbUpdate('project_steps', 'id=eq.' + 'tmp_' + i + '_' + orderedIds[i], { order_num: newOrder, id: projectId + '_' + track + '_' + newOrder });
  }
}

async function updateBenchmark(checkId, avgListeners) {

const calState = { anchor: new Date(), mode: 'maand' };
function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
function isSameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

function computeWeekBands(week, projects) {
  const candidates = [];
  projects.forEach(p => {
    const start = p.start_date ? new Date(p.start_date) : null;
    const launch = p.launch_date ? new Date(p.launch_date) : null;
    if (!start || !launch || isSameDay(start, launch)) return;
    if (launch < week[0] || start > week[6]) return;
    const segStart = start < week[0] ? week[0] : start;
    const segEnd = launch > week[6] ? week[6] : launch;
    const colStart = week.findIndex(d => isSameDay(d, segStart));
    const colEnd = week.findIndex(d => isSameDay(d, segEnd));
    if (colStart === -1 || colEnd === -1) return;
    let label = p.name;
    if (isSameDay(segStart, start)) label = '\u25B6 ' + label;
    if (isSameDay(segEnd, launch)) label = label + ' \u{1F3C1}';
    candidates.push({ colStart, colEnd, label, color: p.color, id: p.id });
  });
  const rows = [];
  candidates.forEach(c => {
    const row = rows.find(r => r.every(item => c.colEnd < item.colStart || c.colStart > item.colEnd));
    if (row) row.push(c); else rows.push([c]);
  });
  return rows;
}

function singleDayItemsForDay(day, projects) {
  const items = [];
  projects.forEach(p => {
    const start = p.start_date ? new Date(p.start_date) : null;
    const launch = p.launch_date ? new Date(p.launch_date) : null;
    if (start && launch && isSameDay(start, launch) && isSameDay(day, start)) items.push({label: '\u25B6\u{1F3C1} ' + p.name, color: p.color, id: p.id});
    else if (start && !launch && isSameDay(start, day)) items.push({label: '\u25B6 ' + p.name, color: p.color, id: p.id});
    else if (launch && !start && isSameDay(launch, day)) items.push({label: '\u{1F3C1} ' + p.name, color: p.color, id: p.id});
  });
  return items;
}

function renderHomeCalendar(containerId, projects) {
  if (calState.mode === 'jaar') renderYearCalendar(containerId, projects);
  else renderMonthCalendar(containerId, projects);
}
function calModeToggleHtml() {
  return `<div class="tl-zoom"><button data-mode="maand" class="${calState.mode==='maand'?'active':''}">Maand</button><button data-mode="jaar" class="${calState.mode==='jaar'?'active':''}">Jaar</button></div>`;
}
function wireCalControls(containerId, projects) {
  document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.onclick = () => { calState.mode = btn.dataset.mode; renderHomeCalendar(containerId, projects); };
  });
  document.getElementById('calPrev').onclick = () => {
    calState.anchor = calState.mode === 'jaar' ? new Date(calState.anchor.getFullYear()-1, calState.anchor.getMonth(), 1) : new Date(calState.anchor.getFullYear(), calState.anchor.getMonth()-1, 1);
    renderHomeCalendar(containerId, projects);

    calState.anchor = calState.mode === 'jaar' ? new Date(calState.anchor.getFullYear()+1, calState.anchor.getMonth(), 1) : new Date(calState.anchor.getFullYear(), calState.anchor.getMonth()+1, 1);
    renderHomeCalendar(containerId, projects);
  };
  document.getElementById('calToday').onclick = () => { calState.anchor = new Date(); renderHomeCalendar(containerId, projects); };
}
function renderYearCalendar(containerId, projects) {
  const container = document.getElementById(containerId);
  const year = calState.anchor.getFullYear();
  const today = new Date();
  const months = [];
  for (let m = 0; m < 12; m++) {
    const monthStart = new Date(year, m, 1);
    const monthEnd = new Date(year, m+1, 0);
    const active = projects.filter(p => {
      const s = p.start_date ? new Date(p.start_date) : null;
      if (!s) return false;
      const end = p.launch_date ? new Date(p.launch_date) : s;
      return end >= monthStart && s <= monthEnd;
    });
    months.push({ label: monthStart.toLocaleDateString('nl-NL',{month:'long'}), monthStart, active });
  }
  const monthCardHtml = (m) => {
    const isCurrent = today.getFullYear()===year && today.getMonth()===m.monthStart.getMonth();
    const shown = m.active.slice(0,5);
    const extra = m.active.length - shown.length;
    return `<div class="year-month-card ${isCurrent?'current':''}">
      <div class="year-month-label">${m.label.charAt(0).toUpperCase()+m.label.slice(1)}</div>
      <div class="year-month-pills">
        ${shown.map(p => `<div class="cal-chip" style="background:${p.color}" onclick="openProject('${p.id}')" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>`).join('')}
        ${extra > 0 ? `<div class="cal-chip more">+${extra} meer</div>` : ''}
        ${!m.active.length ? '<div class="year-month-empty">\u2014</div>' : ''}
      </div>
    </div>`;
  };
  container.innerHTML = `
    <div class="cal-controls">
      <div class="cal-title">${year}</div>
      <div class="cal-nav">${calModeToggleHtml()}<button class="icon" id="calPrev">\u2190</button><button class="small" id="calToday">Vandaag</button><button class="icon" id="calNext">\u2192</button></div>
    </div>
    <div class="year-grid">${months.map(monthCardHtml).join('')}</div>
  `;
  wireCalControls(containerId, projects);
}
function renderMonthCalendar(containerId, projects) {
  const container = document.getElementById(containerId);
  const anchor = calState.anchor;
  const monthStart = startOfMonth(anchor);
  const gridStart = new Date(monthStart);
  gridStart.setDate(gridStart.getDate() - ((monthStart.getDay()+6)%7));
  const today = new Date();
  const weeks = [];
  let cur = new Date(gridStart);
  for (let w = 0; w < 6; w++) {
    const days = []; for (let d = 0; d < 7; d++) { days.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
    weeks.push(days);
    if (cur > monthStart && cur.getMonth() !== monthStart.getMonth() && w >= 4) break;
  }
  const weekHtml = (week) => {
    const daynumCells = week.map(day => {
      const inMonth = day.getMonth() === monthStart.getMonth();
      const isToday = isSameDay(day, today);
      return `<div class="cal-daynum-cell ${inMonth?'':'other-month'} ${isToday?'today':''}"><span class="cal-daynum">${day.getDate()}</span></div>`;
    }).join('');
    const bandRows = computeWeekBands(week, projects);
    const bandRowsHtml = bandRows.map(row => `
      <div class="cal-band-grid">
        ${row.map(b => `<div class="cal-band" style="grid-column:${b.colStart+1} / ${b.colEnd+2};border:1.5px solid ${b.color};color:${b.color};background:var(--panel)" onclick="openProject('${b.id}')" title="${escapeHtml(b.label)}">${escapeHtml(b.label)}</div>`).join('')}
      </div>
    `).join('');
    const singleCells = week.map(day => {
      const items = singleDayItemsForDay(day, projects);
      const shown = items.slice(0,2);
      const extra = items.length - shown.length;
      return `<div class="cal-single-cell">
        ${shown.map(e => `<div class="cal-chip" style="background:${e.color}" onclick="openProject('${e.id}')" title="${escapeHtml(e.label)}">${escapeHtml(e.label)}</div>`).join('')}
        ${extra > 0 ? `<div class="cal-chip more" style="background:transparent;color:var(--text-faint);">+${extra} meer</div>` : ''}
      </div>`;
    }).join('');
    return `<div class="cal-week-wrap">
      <div class="cal-daynum-grid">${daynumCells}</div>
      ${bandRowsHtml}
      <div class="cal-single-grid">${singleCells}</div>
    </div>`;
  };
  const monthLabel = anchor.toLocaleDateString('nl-NL', {month:'long', year:'numeric'});
  container.innerHTML = `
    <div class="cal-controls">
      <div class="cal-title">${monthLabel.charAt(0).toUpperCase()+monthLabel.slice(1)}</div>
      <div class="cal-nav">${calModeToggleHtml()}<button class="icon" id="calPrev">\u2190</button><button class="small" id="calToday">Vandaag</button><button class="icon" id="calNext">\u2192</button></div>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays"><div>Ma</div><div>Di</div><div>Wo</div><div>Do</div><div>Vr</div><div>Za</div><div>Zo</div></div>
      <div class="cal-weeks">${weeks.map(weekHtml).join('')}</div>
    </div>
  `;
  wireCalControls(containerId, projects);
}

function renderStatsChart(stats, audioType) {
  if (!stats.length) return '<div class="state-msg" style="padding:20px 0;">Nog geen cijfers ingevoerd. Voeg hieronder een week toe.</div>';
  const thresholds = audioType === 'audio_video' ? {orange:2500, green:6500} : {orange:1500, green:4500};
  const width=640,height=220,padL=44,padR=16,padT=16,padB=28;
  const plotW=width-padL-padR, plotH=height-padT-padB;
  const combinedOf = s => (s.downloads||0) + (s.youtube_views||0);
  const maxVal = Math.max(thresholds.green*1.15, ...stats.map(combinedOf), 1);
  const n = stats.length;
  const xFor = i => padL + (n<=1?plotW/2:(i/(n-1))*plotW);
  const yFor = v => padT+plotH-(v/maxVal)*plotH;
  window.__chartGeom = { stats, xFor, yFor, padL, padT, plotW, plotH, width, height };

  const combPts = stats.map((s,i)=>`${xFor(i)},${yFor(combinedOf(s))}`).join(' ');
  const dlPts = stats.map((s,i)=>`${xFor(i)},${yFor(s.downloads||0)}`).join(' ');
  const ytPts = stats.map((s,i)=>`${xFor(i)},${yFor(s.youtube_views||0)}`).join(' ');
  const zones = `
    <rect x="${padL}" y="${padT}" width="${plotW}" height="${Math.max(0,yFor(thresholds.green)-padT)}" fill="var(--green)" opacity="0.07"/>
    <rect x="${padL}" y="${yFor(thresholds.green)}" width="${plotW}" height="${Math.max(0,yFor(thresholds.orange)-yFor(thresholds.green))}" fill="var(--orange)" opacity="0.07"/>
    <rect x="${padL}" y="${yFor(thresholds.orange)}" width="${plotW}" height="${Math.max(0,padT+plotH-yFor(thresholds.orange))}" fill="var(--red)" opacity="0.07"/>`;
  const dashedLines = `
    <line x1="${padL}" y1="${yFor(thresholds.green)}" x2="${padL+plotW}" y2="${yFor(thresholds.green)}" stroke="var(--green)" stroke-dasharray="4,3" stroke-width="1"/>
    <text x="${padL+plotW-2}" y="${yFor(thresholds.green)-4}" text-anchor="end" font-size="9" fill="var(--green)">groen</text>
    <line x1="${padL}" y1="${yFor(thresholds.orange)}" x2="${padL+plotW}" y2="${yFor(thresholds.orange)}" stroke="var(--orange)" stroke-dasharray="4,3" stroke-width="1"/>
    <text x="${padL+plotW-2}" y="${yFor(thresholds.orange)-4}" text-anchor="end" font-size="9" fill="var(--orange)">oranje</text>`;
  const xLabels = stats.map((s,i)=>`<text x="${xFor(i)}" y="${height-8}" text-anchor="middle" font-size="9" fill="var(--text-faint)">${escapeHtml(s.week_label||('w'+s.week_number))}</text>`).join('');
  const yTickCount = 4;
  let yGridLines = '';
  for (let i = 0; i <= yTickCount; i++) {
    const val = (maxVal / yTickCount) * i;
    const y = yFor(val);
    yGridLines += `
      <line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>
      <text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--text-faint)">${formatAxisNumber(val)}</text>
    `;
  }

  return `
    <svg viewBox="0 0 ${width} ${height}" id="statsChartSvg" class="stats-chart-svg" style="overflow:visible;display:block;" onmousemove="handleChartHover(event)" onmouseleave="hideChartHover()">
      ${yGridLines}
      ${zones}
      ${dashedLines}
      <polyline points="${dlPts}" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0.55"/>
      <polyline points="${ytPts}" fill="none" stroke="#c05fd1" stroke-width="1.5" opacity="0.55"/>
      <polyline points="${combPts}" fill="none" stroke="#f4f1ea" stroke-width="2.5"/>
      ${stats.map((s,i)=>`<circle cx="${xFor(i)}" cy="${yFor(combinedOf(s))}" r="3" fill="#f4f1ea"/>`).join('')}
      ${xLabels}
      <g id="chartCrosshair" style="display:none;">
        <line id="crossLine" x1="0" y1="${padT}" x2="0" y2="${padT+plotH}" stroke="var(--text-faint)" stroke-width="1"/>
      </g>
    </svg>
    <div class="chart-legend"><span><i style="background:#f4f1ea"></i>Totaal (benchmark)</span><span><i style="background:var(--accent)"></i>Springcast</span><span><i style="background:#c05fd1"></i>YouTube</span></div>
    <div id="chartTooltip" class="chart-tooltip hidden"></div>
  `;
}
function handleChartHover(evt) {
  const geom = window.__chartGeom;
  if (!geom) return;
  const svg = document.getElementById('statsChartSvg');
  const rect = svg.getBoundingClientRect();
  const scaleX = geom.width / rect.width;
  const xInSvg = (evt.clientX - rect.left) * scaleX;
  let nearest = 0, bestDist = Infinity;
  geom.stats.forEach((s,i) => { const d = Math.abs(geom.xFor(i) - xInSvg); if (d < bestDist) { bestDist = d; nearest = i; } });
  const s = geom.stats[nearest];
  const total = (s.downloads||0) + (s.youtube_views||0);
  const cross = document.getElementById('chartCrosshair');
  const line = document.getElementById('crossLine');
  if (!cross || !line) return;
  cross.style.display = '';
  line.setAttribute('x1', geom.xFor(nearest)); line.setAttribute('x2', geom.xFor(nearest));
  const tooltip = document.getElementById('chartTooltip');
  tooltip.classList.remove('hidden');
  tooltip.innerHTML = `<b>${escapeHtml(s.week_label || ('week '+s.week_number))}</b><br>Totaal: ${total}<br>Springcast: ${s.downloads ?? '\u2013'}<br>YouTube: ${s.youtube_views ?? '\u2013'}`;
  const svgRect = svg.getBoundingClientRect();
  const px = (geom.xFor(nearest)/geom.width)*svgRect.width;
  tooltip.style.left = Math.min(px + 10, svgRect.width - 130) + 'px';
  tooltip.style.top = '4px';
}
function hideChartHover() {
  const cross = document.getElementById('chartCrosshair'); if (cross) cross.style.display = 'none';
  const tooltip = document.getElementById('chartTooltip'); if (tooltip) tooltip.classList.add('hidden');
}

const CHART_LINE_COLORS = ['#5b8def','#e0a63a','#4caf7d','#e2585a','#a97fd1','#3ab7c9','#e08a5c','#c05fd1','#8ece63','#e2c53a','#79b0e0','#d9737d'];

function refreshComparisonChart() {
  const checkedIds = Array.from(document.querySelectorAll('#compareToggles input:checked')).map(el => el.dataset.show);
  const filtered = (window.__comparisonStats || []).filter(s => checkedIds.includes(s.show_id));
  document.getElementById('comparisonChartWrap').innerHTML = renderComparisonChartSvg(filtered, window.__comparisonShows || []);
}
function renderComparisonChartSvg(stats, shows) {
  if (!stats.length) return '<div class="state-msg" style="padding:20px 0;">Geen cijfers om te tonen.</div>';
  const width=640,height=220,padL=44,padR=16,padT=16,padB=28;
  const plotW=width-padL-padR, plotH=height-padT-padB;
  const byShow = {};
  stats.forEach(s => { (byShow[s.show_id]=byShow[s.show_id]||[]).push(s); });
  Object.values(byShow).forEach(arr=>arr.sort((a,b)=>a.week_number-b.week_number));
  const combinedOf = s => (s.downloads||0)+(s.youtube_views||0);
  const maxWeek = Math.max(...stats.map(s=>s.week_number),1);
  const maxVal = Math.max(...stats.map(combinedOf),1);
  const xFor = w => padL + ((w-1)/(Math.max(maxWeek-1,1)))*plotW;
  const yFor = v => padT+plotH-(v/maxVal)*plotH;
  const showMap = {}; (shows||[]).forEach(s=>showMap[s.id]=s);
  const showIds = Object.keys(byShow);
  window.__compareChartGeom = { byShow, xFor, yFor, width, height, combinedOf, showMap };
  const lines = showIds.map((showId,i) => {
    const arr = byShow[showId];
    const color = CHART_LINE_COLORS[i % CHART_LINE_COLORS.length];
    const pts = arr.map(s=>`${xFor(s.week_number)},${yFor(combinedOf(s))}`).join(' ');
    return `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>${arr.map(s=>`<circle cx="${xFor(s.week_number)}" cy="${yFor(combinedOf(s))}" r="2.5" fill="${color}"/>`).join('')}`;
  }).join('');
  const legend = showIds.map((showId,i) => `<span><i style="background:${CHART_LINE_COLORS[i % CHART_LINE_COLORS.length]}"></i>${escapeHtml(showMap[showId]?showMap[showId].name:showId)}</span>`).join('');
  const axes = renderChartAxes({ padL, padT, plotW, plotH, maxWeek, maxVal, xFor, yFor });
  return `
    <svg viewBox="0 0 ${width} ${height}" id="compareChartSvg" class="stats-chart-svg" onmousemove="handleCompareChartHover(event)" onmouseleave="hideCompareChartHover()">
      ${axes}${lines}
      <g id="compareCrosshair" style="display:none;"><line id="compareCrossLine" x1="0" y1="${padT}" x2="0" y2="${padT+plotH}" stroke="var(--text-faint)" stroke-width="1"/></g>
    </svg>
    <div class="chart-legend">${legend}</div>
    <div id="compareChartTooltip" class="chart-tooltip hidden"></div>
  `;
}
function handleCompareChartHover(evt) {
  const geom = window.__compareChartGeom;
  if (!geom) return;
  const svg = document.getElementById('compareChartSvg');
  const rect = svg.getBoundingClientRect();
  const scaleX = geom.width / rect.width;
  const xInSvg = (evt.clientX - rect.left) * scaleX;
  const allWeeks = [...new Set(Object.values(geom.byShow).flat().map(s=>s.week_number))].sort((a,b)=>a-b);
  if (!allWeeks.length) return;
  let nearestWeek = allWeeks[0], bestDist = Infinity;
  allWeeks.forEach(w => { const d = Math.abs(geom.xFor(w) - xInSvg); if (d < bestDist) { bestDist = d; nearestWeek = w; } });
  const cross = document.getElementById('compareCrosshair');
  const line = document.getElementById('compareCrossLine');
  if (!cross || !line) return;
  cross.style.display = '';
  line.setAttribute('x1', geom.xFor(nearestWeek)); line.setAttribute('x2', geom.xFor(nearestWeek));
  const tooltip = document.getElementById('compareChartTooltip');
  tooltip.classList.remove('hidden');
  let html = `<b>week ${nearestWeek}</b>`;
  Object.keys(geom.byShow).forEach((showId, i) => {
    const match = geom.byShow[showId].find(s => s.week_number === nearestWeek);
    if (!match) return;
    const name = geom.showMap[showId] ? geom.showMap[showId].name : showId;
    const color = CHART_LINE_COLORS[i % CHART_LINE_COLORS.length];
    html += `<br><span style="color:${color}">${escapeHtml(name)}</span>: ${geom.combinedOf(match)} <span style="color:var(--text-faint)">(Springcast ${match.downloads ?? 0}, YouTube ${match.youtube_views ?? 0})</span>`;
  });
  tooltip.innerHTML = html;
  const svgRect = svg.getBoundingClientRect();
  const px = (geom.xFor(nearestWeek)/geom.width)*svgRect.width;
  tooltip.style.left = Math.min(px+10, svgRect.width-220) + 'px';
  tooltip.style.top = '4px';
}
function hideCompareChartHover() {
  const cross = document.getElementById('compareCrosshair'); if (cross) cross.style.display = 'none';
  const tooltip = document.getElementById('compareChartTooltip'); if (tooltip) tooltip.classList.add('hidden');
}

function isoWeekMonday(year, week) {
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const jan4Day = jan4.getUTCDay() || 7;
  const week1Monday = new Date(jan4); week1Monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1);
  const target = new Date(week1Monday); target.setUTCDate(week1Monday.getUTCDate() + (week - 1) * 7);
  return target;
}
const MONTH_NAMES_NL = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
function groupStatsByMonth(stats) {
  const buckets = {};
  stats.forEach(s => {
    const d = isoWeekMonday(s.year, s.week_number);
    const key = d.getUTCFullYear() + '-' + d.getUTCMonth();
    if (!buckets[key]) buckets[key] = { year: d.getUTCFullYear(), month: d.getUTCMonth(), weeks: [] };
    buckets[key].weeks.push(s);
  });
  const groups = Object.values(buckets).map(g => {
    g.weeks.sort((a,b) => b.week_number - a.week_number || b.year - a.year);
    const springcastSum = g.weeks.reduce((sum,s) => sum + (s.downloads||0), 0);
    const youtubeSum = g.weeks.reduce((sum,s) => sum + (s.youtube_views||0), 0);
    g.label = MONTH_NAMES_NL[g.month].charAt(0).toUpperCase() + MONTH_NAMES_NL[g.month].slice(1) + ' ' + g.year;

const YEAR_DASH = { 2026: 'none', 2025: '7,4', 2024: '2,3' };

function formatAxisNumber(n) {

  return String(Math.round(n));

function renderChartAxes({ padL, padT, plotW, plotH, maxWeek, maxVal, xFor, yFor }) {
  const yTickCount = 4;
  const yTicks = [];
  for (let i = 0; i <= yTickCount; i++) {
    const val = (maxVal / yTickCount) * i;
    const y = yFor(val);
    yTicks.push(`
      <line x1="${padL}" y1="${y}" x2="${padL+plotW}" y2="${y}" stroke="var(--border)" stroke-width="1" opacity="0.5"/>
      <text x="${padL-6}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--text-faint)">${formatAxisNumber(val)}</text>
    `);
  }
  const xTickStep = maxWeek <= 10 ? 1 : Math.ceil(maxWeek / 10);
  const xTicks = [];
  for (let w = 1; w <= maxWeek; w += xTickStep) {
    xTicks.push(`<text x="${xFor(w)}" y="${padT+plotH+16}" text-anchor="middle" font-size="9" fill="var(--text-faint)">wk${w}</text>`);
  }
  return yTicks.join('') + xTicks.join('');
}
function renderShowChart(showId, stats, audioType, activeMetrics) {
  activeMetrics = (activeMetrics && activeMetrics.length) ? activeMetrics : ['totaal'];
  if (!stats.length) return '<div class="state-msg" style="padding:20px 0;">Nog geen cijfers voor de geselecteerde jaren.</div>';
  const thresholds = audioType === 'audio_video' ? {orange:2500, green:6500} : {orange:1500, green:4500};
  const width=640,height=220,padL=44,padR=16,padT=16,padB=28;
  const plotW=width-padL-padR, plotH=height-padT-padB;
  const byYear = {};
  stats.forEach(s => { (byYear[s.year] = byYear[s.year]||[]).push(s); });
  Object.values(byYear).forEach(arr => arr.sort((a,b)=>a.week_number-b.week_number));
  const maxWeek = Math.max(...stats.map(s=>s.week_number), 1);
  const maxVal = Math.max(thresholds.green*1.15, ...stats.flatMap(s => activeMetrics.map(m => metricValue(s,m))), 1);
  const xFor = w => padL + ((w-1)/(Math.max(maxWeek-1,1)))*plotW;
  const yFor = v => padT+plotH-(v/maxVal)*plotH;

  const zones = `
    <rect x="${padL}" y="${padT}" width="${plotW}" height="${Math.max(0,yFor(thresholds.green)-padT)}" fill="var(--green)" opacity="0.07"/>
    <rect x="${padL}" y="${yFor(thresholds.green)}" width="${plotW}" height="${Math.max(0,yFor(thresholds.orange)-yFor(thresholds.green))}" fill="var(--orange)" opacity="0.07"/>
    <rect x="${padL}" y="${yFor(thresholds.orange)}" width="${plotW}" height="${Math.max(0,padT+plotH-yFor(thresholds.orange))}" fill="var(--red)" opacity="0.07"/>`;
  const dashedLines = `
    <line x1="${padL}" y1="${yFor(thresholds.green)}" x2="${padL+plotW}" y2="${yFor(thresholds.green)}" stroke="var(--green)" stroke-dasharray="4,3" stroke-width="1"/>

    <line x1="${padL}" y1="${yFor(thresholds.orange)}" x2="${padL+plotW}" y2="${yFor(thresholds.orange)}" stroke="var(--orange)" stroke-dasharray="4,3" stroke-width="1"/>
    <text x="${padL+plotW-2}" y="${yFor(thresholds.orange)-4}" text-anchor="end" font-size="9" fill="var(--orange)">oranje</text>`;
  const lines = Object.keys(byYear).sort().map(year => activeMetrics.map(metricKey => {
    const metricDef = METRIC_DEFS.find(m => m.key === metricKey);
    const arr = byYear[year];
    const pts = arr.map(s => `${xFor(s.week_number)},${yFor(metricValue(s,metricKey))}`).join(' ');
    const dash = YEAR_DASH[year] || 'none';

  }).join('')).join('');

  const yearsShown = Object.keys(byYear).sort();

  const axes = renderChartAxes({ padL, padT, plotW, plotH, maxWeek, maxVal, xFor, yFor });

    <svg viewBox="0 0 ${width} ${height}" id="showChartSvg_${showId}" class="stats-chart-svg" onmousemove="handleShowChartHover(event,'${showId}')" onmouseleave="hideShowChartHover('${showId}')">
      ${axes}${zones}${dashedLines}${lines}
      <g id="showCrosshair_${showId}" style="display:none;"><line id="showCrossLine_${showId}" x1="0" y1="${padT}" x2="0" y2="${padT+plotH}" stroke="var(--text-faint)" stroke-width="1"/></g>
    </svg>
    <div class="chart-legend">${metricLegend}</div>

function handleShowChartHover(evt, showId) {
  const geom = window.__showChartGeom && window.__showChartGeom[showId];
  if (!geom) return;
  const svg = document.getElementById('showChartSvg_' + showId);
  const rect = svg.getBoundingClientRect();
  const scaleX = geom.width / rect.width;
  const xInSvg = (evt.clientX - rect.left) * scaleX;
  const allWeeks = [...new Set(Object.values(geom.byYear).flat().map(s=>s.week_number))].sort((a,b)=>a-b);
  if (!allWeeks.length) return;
  let nearestWeek = allWeeks[0], bestDist = Infinity;
  allWeeks.forEach(w => { const d = Math.abs(geom.xFor(w) - xInSvg); if (d < bestDist) { bestDist = d; nearestWeek = w; } });
  const cross = document.getElementById('showCrosshair_' + showId);
  const line = document.getElementById('showCrossLine_' + showId);
  if (!cross || !line) return;
  cross.style.display = '';
  line.setAttribute('x1', geom.xFor(nearestWeek)); line.setAttribute('x2', geom.xFor(nearestWeek));
  const tooltip = document.getElementById('showChartTooltip_' + showId);
  tooltip.classList.remove('hidden');
  let html = `<b>week ${nearestWeek}</b>`;
  Object.keys(geom.byYear).sort().forEach(year => {
    const match = geom.byYear[year].find(s => s.week_number === nearestWeek);
    if (!match) return;
    html += `<br><b style="color:var(--text-faint)">${year}</b>`;
    geom.activeMetrics.forEach(mk => {
      const d = METRIC_DEFS.find(m=>m.key===mk);
      html += `<br><span style="color:${d.color}">${d.label}</span>: ${metricValue(match, mk).toLocaleString('nl-NL')}`;
    });
  });
  tooltip.innerHTML = html;
  const svgRect = svg.getBoundingClientRect();
  const px = (geom.xFor(nearestWeek)/geom.width)*svgRect.width;
  tooltip.style.left = Math.min(px+10, svgRect.width-150) + 'px';
  tooltip.style.top = '4px';
}
function hideShowChartHover(showId) {
  const cross = document.getElementById('showCrosshair_'+showId); if (cross) cross.style.display='none';
  const tooltip = document.getElementById('showChartTooltip_'+showId); if (tooltip) tooltip.classList.add('hidden');
}

// ================= Ruler timeline (detail view) =================
const tlState = {};
function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
function addMonths(d, n) { const x = new Date(d); x.setMonth(x.getMonth()+n); return x; }
function addYears(d, n) { const x = new Date(d); x.setFullYear(x.getFullYear()+n); return x; }
function startOfWeek(d) { const x = new Date(d); x.setHours(0,0,0,0); const day=(x.getDay()+6)%7; return addDays(x,-day); }
function endOfMonth(d) { return new Date(d.getFullYear(), d.getMonth()+1, 0, 23,59,59); }
function startOfYear(d) { return new Date(d.getFullYear(), 0, 1); }
function endOfYear(d) { return new Date(d.getFullYear(), 11, 31, 23,59,59); }
function computeRange(zoom, anchor) {
  if (zoom === 'jaar') return { start: startOfYear(anchor), end: endOfYear(anchor), unit: 'month' };
  if (zoom === 'maand') return { start: startOfMonth(anchor), end: endOfMonth(anchor), unit: 'day' };
  if (zoom === 'week') { const s = startOfWeek(anchor); return { start: s, end: addDays(s,6), unit: 'day' }; }
  const s = new Date(anchor); s.setHours(0,0,0,0); return { start: s, end: addDays(s,1), unit: 'hour' };
}
function rangeLabel(zoom, anchor) {
  if (zoom === 'jaar') return String(anchor.getFullYear());
  if (zoom === 'maand') return anchor.toLocaleDateString('nl-NL', {month:'long', year:'numeric'});
  if (zoom === 'week') return 'week van ' + startOfWeek(anchor).toLocaleDateString('nl-NL', {day:'numeric',month:'short'});
  return anchor.toLocaleDateString('nl-NL', {day:'numeric',month:'long',year:'numeric'});
}
function shiftAnchor(zoom, anchor, dir) {
  if (zoom === 'jaar') return addYears(anchor, dir);
  if (zoom === 'maand') return addMonths(anchor, dir);
  if (zoom === 'week') return addDays(anchor, dir*7);
  return addDays(anchor, dir);
}
function buildColumns(range) {
  const cols = [];
  if (range.unit === 'month') { let d = new Date(range.start); while (d <= range.end) { cols.push({label: d.toLocaleDateString('nl-NL',{month:'short'})}); d = addMonths(d,1); } }
  else if (range.unit === 'day') { let d = new Date(range.start); while (d <= range.end) { cols.push({label: String(d.getDate())}); d = addDays(d,1); } }
  else { for (let h=0; h<24; h+=3) cols.push({label: h+':00'}); }
  return cols;
}
function pct(date, range) {
  const total = range.end.getTime() - range.start.getTime();
  return Math.max(0, Math.min(100, ((date.getTime() - range.start.getTime())/total)*100));
}
function renderTimeline(containerId, rows, opts) {
  opts = opts || {};
  if (!tlState[containerId]) tlState[containerId] = { zoom: 'maand', anchor: new Date() };
  const st = tlState[containerId];
  const range = computeRange(st.zoom, st.anchor);
  const cols = buildColumns(range);
  const today = new Date();
  const showToday = today >= range.start && today <= range.end;
  const todayPct = showToday ? pct(today, range) : null;
  const zoomBtns = ['dag','week','maand','jaar'].map(z => `<button data-zoom="${z}" class="${z===st.zoom?'active':''}">${z[0].toUpperCase()+z.slice(1)}</button>`).join('');
  const rowsHtml = rows.map(r => {
    let barHtml = '<span class="tl-outside">geen datums</span>';
    if (r.start && r.end) {
      const intersects = r.end >= range.start && r.start <= range.end;
      if (intersects) {
        const left = pct(r.start < range.start ? range.start : r.start, range);
        const right = pct(r.end > range.end ? range.end : r.end, range);
        const width = Math.max(1.2, right - left);
        barHtml = `<div class="tl-bar" style="left:${left}%;width:${width}%;background:${r.color}" title="${escapeHtml(r.label)}: ${r.start.toLocaleDateString('nl-NL')} \u2192 ${r.end.toLocaleDateString('nl-NL')}"><span class="tl-bar-label">${escapeHtml(r.sublabel||'')}</span></div>`;
        (r.markers||[]).forEach(m => { if (m.date >= range.start && m.date <= range.end) barHtml += `<div class="tl-marker" style="left:${pct(m.date,range)}%;background:${m.color||'#fff'}" title="${escapeHtml(m.label)}"></div>`; });
      } else {
        barHtml = `<span class="tl-outside">${r.end < range.start ? '\u2190 eerder' : '\u2192 later'} \u00b7 t/m ${r.end.toLocaleDateString('nl-NL')}</span>`;
      }
    }
    return `<div class="tl-row"><div class="tl-row-label" ${r.onClickId ? `onclick="openProject('${r.onClickId}')" style="cursor:pointer"` : ''}><div class="tl-proj-name"><span class="tl-color-dot" style="background:${r.color}"></span>${escapeHtml(r.label)}</div></div><div class="tl-row-track">${barHtml}</div></div>`;
  }).join('');
  const html = `
    <div class="tl-controls">
      <div class="tl-zoom">${zoomBtns}</div>
      <div class="tl-nav"><button class="icon" data-nav="-1">\u2190</button><span class="tl-label">${rangeLabel(st.zoom, st.anchor)}</span><button class="icon" data-nav="1">\u2192</button><button class="small" data-nav="today">Vandaag</button></div>

async function loadSidebarTodos(projects, showProjects, projectToShow) {
  projectToShow = projectToShow || {};
  const sidebar = document.getElementById('homeSidebar');
  const today = new Date(); today.setHours(0,0,0,0);
  const startedProjects = projects.filter(p => p.start_date && new Date(p.start_date) <= today);
  const allEligible = startedProjects.concat(showProjects || []);
  if (!allEligible.length) { sidebar.innerHTML = '<h3>Openstaande taken</h3><div class="state-msg" style="padding:20px;">Niets openstaand.</div>'; return; }
  try {
    const projectMap = {}; allEligible.forEach(p => projectMap[p.id] = p);
    const steps = await sbSelect('project_steps', 'status=neq.done&select=id,project_id,track,step_name,priority,order_num&order=order_num.asc');
    const relevant = steps.filter(s => projectMap[s.project_id]);

    // track-focus ranking: productie t/m Logo design (order<=5) > distributie > rest van productie > marketing
    const trackRank = (s) => {
      if (s.track === 'productie') return s.order_num <= 5 ? 0 : 2;
      if (s.track === 'distributie') return 1;
      if (s.track === 'marketing') return 3;
      return 1.5;
    };

    // top (most relevant open) task per started project
    const topPerProject = {};
    relevant.forEach(s => {
      const current = topPerProject[s.project_id];
      if (!current || trackRank(s) < trackRank(current) || (trackRank(s) === trackRank(current) && s.order_num < current.order_num)) {
        topPerProject[s.project_id] = s;
      }
    });
    const topTasks = Object.values(topPerProject);

    // any explicitly flagged tasks (across started projects, regardless of "top" status)
    const flagged = relevant.filter(s => s.priority);

    const launchTime = (projectId) => {
      const p = projectMap[projectId];
      return (p && p.launch_date) ? new Date(p.launch_date).getTime() : Infinity;
    };
    const prioRank = { rood: 0, oranje: 1, groen: 2 };
    const seen = new Set();
    const merged = [];
    flagged.slice()
      .sort((a,b) => (prioRank[a.priority]??3) - (prioRank[b.priority]??3) || launchTime(a.project_id) - launchTime(b.project_id))
      .forEach(s => { if (!seen.has(s.id)) { seen.add(s.id); merged.push(s); } });
    topTasks.slice()
      .sort((a,b) => launchTime(a.project_id) - launchTime(b.project_id))
      .forEach(s => { if (!seen.has(s.id)) { seen.add(s.id); merged.push(s); } });

    if (!merged.length) { sidebar.innerHTML = '<h3>Openstaande taken</h3><div class="state-msg" style="padding:20px;">Niets openstaand.</div>'; return; }
    sidebar.innerHTML = `<h3>Openstaande taken</h3>${merged.map(s => {
      const proj = projectMap[s.project_id];
      const clickTarget = projectToShow[s.project_id] ? `openShow('${projectToShow[s.project_id]}')` : `openProject('${s.project_id}')`;
      return `<div class="sidebar-todo prio-${s.priority||'none'}" onclick="${clickTarget}">
        <span class="sidebar-prio ${s.priority||'none'}"></span>
        <div class="sidebar-todo-text">${escapeHtml(s.step_name)}<div class="sidebar-todo-proj" style="color:${proj.color}">${escapeHtml(proj.name)}</div></div>
      </div>`;
    }).join('')}`;
  } catch (e) {
    sidebar.innerHTML = `<h3>Openstaande taken</h3><div class="state-msg">Kon niet laden.</div>`;
  }
}

function setupPersonalDragDrop(listEl) {
  if (!listEl || listEl.__dragWired) return;
  listEl.__dragWired = true;
  let draggedId = null;
  listEl.addEventListener('dragstart', e => { if (!isOwner) { e.preventDefault(); return; } const el = e.target.closest('.step'); if (!el) return; draggedId = el.dataset.stepId; el.classList.add('dragging'); });
  listEl.addEventListener('dragend', e => { const el = e.target.closest('.step'); if (el) el.classList.remove('dragging'); listEl.querySelectorAll('.step').forEach(s=>s.classList.remove('drag-over')); });
  listEl.addEventListener('dragover', e => { const el = e.target.closest('.step'); if (!el) return; e.preventDefault(); el.classList.add('drag-over'); });
  listEl.addEventListener('dragleave', e => { const el = e.target.closest('.step'); if (el) el.classList.remove('drag-over'); });
  listEl.addEventListener('drop', async e => {
    const el = e.target.closest('.step'); if (!el) return;
    e.preventDefault(); el.classList.remove('drag-over');
    const targetId = el.dataset.stepId;
    if (!draggedId || draggedId === targetId) return;
    const items = Array.from(listEl.querySelectorAll('.step'));
    const draggedEl = items.find(i => i.dataset.stepId === draggedId);
    if (!draggedEl) return;
    const targetIdx = items.indexOf(el);
    listEl.insertBefore(draggedEl, items.indexOf(draggedEl) < targetIdx ? el.nextSibling : el);
    const orderedIds = Array.from(listEl.querySelectorAll('.step')).map(s => s.dataset.stepId);
    for (let i=0;i<orderedIds.length;i++) { await sbUpdate('personal_todos', 'id=eq.'+orderedIds[i], {order_num: i+1}); }
  });
}

let __mediaRecorder = null;
let __recordedChunks = [];
let __recordingSeconds = 0;
let __recordingTimer = null;
let __chunkRotateTimer = null;
let __uploadedChunkPaths = [];
let __isFinalStop = false;
const CHUNK_ROTATE_SECONDS = 18 * 60; // ruim onder de 23-minuten-limiet van het transcriptiemodel

function recButtonHtml(btnId, opts) {
  const attrs = opts.projectId ? `data-project-id="${opts.projectId}"` : `data-show-id="${opts.showId}"`;
  return `
    <div class="rec-btn-wrap">
      <span class="rec-timer-label hidden" id="${btnId}_timer">00:00</span>
      <button class="rec-btn" id="${btnId}" ${attrs} onclick="handleRecClick('${btnId}')">
        <span class="rec-btn-label">REC</span>
        <div class="rec-waveform hidden" id="${btnId}_wave"><span></span><span></span><span></span><span></span></div>
      </button>
    </div>
  `;
}
async function handleRecClick(btnId) {
  if (!requireOwner()) return;
  const btn = document.getElementById(btnId);
  if (__mediaRecorder && __mediaRecorder.state === 'recording') {
    __isFinalStop = true;
    __mediaRecorder.stop();
    return;
  }
  let projectId = btn.dataset.projectId;
  if (!projectId && btn.dataset.showId) {
    projectId = await ensureLinkedProject(btn.dataset.showId);
    btn.dataset.projectId = projectId;
  }
  if (!projectId) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    __uploadedChunkPaths = [];
    __isFinalStop = false;
    __recordingSeconds = 0;
    startRecorderSegment(projectId, stream, btnId);
    setRecButtonState(btnId, true);
    updateRecBtnTimer(btnId);
    __recordingTimer = setInterval(() => { __recordingSeconds++; updateRecBtnTimer(btnId); }, 1000);
  } catch (err) {
    alert('Kon microfoon niet gebruiken: ' + err.message);
  }
}
function startRecorderSegment(projectId, stream, btnId) {
  __recordedChunks = [];
  const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : (MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '');
  __mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
  __mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) __recordedChunks.push(e.data); };
  __mediaRecorder.onstop = async () => {
    const blob = new Blob(__recordedChunks, { type: __mediaRecorder.mimeType || 'audio/webm' });
    try {
      const path = await uploadAudioChunk(projectId, blob);
      __uploadedChunkPaths.push(path);
    } catch (err) {
      alert('Kon een deel van de opname niet opslaan: ' + err.message);
    }
    if (__isFinalStop) {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(__recordingTimer); __recordingTimer = null;
      clearTimeout(__chunkRotateTimer); __chunkRotateTimer = null;
      setRecButtonState(btnId, false);
      __mediaRecorder = null;
      await finalizeRecording(projectId);
    } else {
      // meteen een nieuw stukje starten zodat er geen gat in de opname valt; onzichtbaar voor de gebruiker
      startRecorderSegment(projectId, stream, btnId);
      scheduleChunkRotation(btnId);
    }
  };
  __mediaRecorder.start();
  scheduleChunkRotation(btnId);
}
function scheduleChunkRotation(btnId) {
  clearTimeout(__chunkRotateTimer);
  __chunkRotateTimer = setTimeout(() => {
    if (__mediaRecorder && __mediaRecorder.state === 'recording' && !__isFinalStop) {
      __mediaRecorder.stop(); // triggert onstop hierboven, dat automatisch een nieuw stukje start
    }
  }, CHUNK_ROTATE_SECONDS * 1000);
}
function setRecButtonState(btnId, recording) {
  const btn = document.getElementById(btnId);
  const wave = document.getElementById(btnId + '_wave');
  const label = btn ? btn.querySelector('.rec-btn-label') : null;
  const timer = document.getElementById(btnId + '_timer');
  if (!btn) return;
  btn.classList.toggle('recording', recording);
  if (wave) wave.classList.toggle('hidden', !recording);
  if (label) label.classList.toggle('hidden', recording);
  if (timer) timer.classList.toggle('hidden', !recording);
}
function updateRecBtnTimer(btnId) {
  const timer = document.getElementById(btnId + '_timer');
  if (!timer) return;
  const m = String(Math.floor(__recordingSeconds/60)).padStart(2,'0');
  const s = String(__recordingSeconds%60).padStart(2,'0');
  timer.textContent = m + ':' + s;
}
async function uploadAudioChunk(projectId, blob) {
  const { url: SB_URL, key: SB_KEY } = getConfig();
  const authToken = await getAuthToken();
  const ext = blob.type.includes('mp4') ? 'm4a' : 'webm';
  const filename = projectId + '_' + Date.now() + '_' + Math.floor(Math.random()*10000) + '.' + ext;
  const uploadRes = await fetch(`${SB_URL}/storage/v1/object/meeting-audio/${filename}`, {
    method: 'POST', headers: { apikey: SB_KEY, Authorization: 'Bearer ' + authToken, 'Content-Type': blob.type }, body: blob
  });
  if (!uploadRes.ok) throw new Error('Upload mislukt (' + uploadRes.status + ')');
  return filename;
}
async function finalizeRecording(projectId) {
  try {
    if (!__uploadedChunkPaths.length) throw new Error('Geen audio opgenomen.');
    const noteId = uid('meet');
    await sbInsert('meeting_notes', [{ id: noteId, project_id: projectId, title: 'Meeting ' + fmtDate(new Date().toISOString()), audio_paths: __uploadedChunkPaths, status: 'recorded' }]);
    const notes = await sbSelect('meeting_notes', 'project_id=eq.' + projectId + '&select=*&order=created_at.desc');
    refreshMeetingList(projectId, notes);
  } catch (err) {
    alert('Kon opname niet opslaan: ' + err.message);
  }
}
async function deleteMeetingNote(noteId, projectId) {
  if (!requireOwner()) return;
  if (!confirm('Deze meeting-opname verwijderen?')) return;
  try {
    const row = (await sbSelect('meeting_notes', 'id=eq.' + noteId + '&select=audio_path,audio_paths'))[0];
    await sbDelete('meeting_notes', 'id=eq.' + noteId);
    const pathsToDelete = (row && row.audio_paths && row.audio_paths.length) ? row.audio_paths : (row && row.audio_path ? [row.audio_path] : []);
    if (pathsToDelete.length) {
      const { url: SB_URL, key: SB_KEY } = getConfig();
      const authToken = await getAuthToken();
      await Promise.all(pathsToDelete.map(path =>
        fetch(`${SB_URL}/storage/v1/object/meeting-audio/${path}`, { method: 'DELETE', headers: { apikey: SB_KEY, Authorization: 'Bearer ' + authToken } }).catch(()=>{})
      ));
    }
    const notes = await sbSelect('meeting_notes', 'project_id=eq.' + projectId + '&select=*&order=created_at.desc');
    refreshMeetingList(projectId, notes);
  } catch (err) {
    alert('Kon opname niet verwijderen: ' + err.message);
  }
}

// ---- Verwerken: transcriptie (Whisper) + taakvoorstellen (Claude), via serverless functies ----
async function processMeeting(noteId, projectId) {
  if (!requireOwner()) return;
  try {
    await sbUpdate('meeting_notes', 'id=eq.' + noteId, { status: 'transcribing' });
    const notes = await sbSelect('meeting_notes', 'project_id=eq.' + projectId + '&select=*&order=created_at.desc');
    refreshMeetingList(projectId, notes);

    // Achtergrondfunctie: start het verwerken en wacht niet op het resultaat in dit verzoek zelf
    // (nodig voor langere opnames, die anders de 10-seconden-limiet van een gewone functie raken).
    // De functie zoekt zelf de audiobestanden (mogelijk meerdere stukjes) bij deze meeting op.
    const kickoffRes = await fetch('/.netlify/functions/process-meeting', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ noteId, projectId })
    });
    if (!kickoffRes.ok && kickoffRes.status !== 202) {
      throw new Error('Verwerk-functie nog niet beschikbaar (status ' + kickoffRes.status + '). Is de serverless functie al gedeployed?');
    }
    pollMeetingStatus(noteId, projectId);
  } catch (err) {
    await sbUpdate('meeting_notes', 'id=eq.' + noteId, { status: 'recorded' });
    const notes = await sbSelect('meeting_notes', 'project_id=eq.' + projectId + '&select=*&order=created_at.desc');
    refreshMeetingList(projectId, notes);
    alert('Verwerken mislukt: ' + err.message);
  }
}
async function pollMeetingStatus(noteId, projectId, attempt) {
  attempt = attempt || 0;
  if (attempt > 90) return; // ~15 minuten bij 10s interval, dan stoppen we vanzelf met pollen
  await new Promise(r => setTimeout(r, 10000));
  let note;
  try { note = (await sbSelect('meeting_notes', 'id=eq.' + noteId + '&select=*'))[0]; }
  catch (e) { return; }
  if (!note) return;
  if (note.status === 'transcribing') { pollMeetingStatus(noteId, projectId, attempt + 1); return; }
  const notes = await sbSelect('meeting_notes', 'project_id=eq.' + projectId + '&select=*&order=created_at.desc');
  refreshMeetingList(projectId, notes);
  if (note.status === 'ready') showTaskReviewModal(noteId, projectId);
}

async function showTaskReviewModal(noteId, projectId) {
  const note = (await sbSelect('meeting_notes', 'id=eq.' + noteId + '&select=*'))[0];

  renderModal(`
