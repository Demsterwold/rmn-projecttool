    <div class="hint">Vink aan wat je wil toevoegen, pas zo nodig de tekst, het project of het spoor aan.</div>
    <div id="taskReviewList" class="task-review-list">
      ${tasks.map((t, i) => `
        <div class="task-review-row">
          <input type="checkbox" id="taskSel_${i}" ${t.selected !== false ? 'checked' : ''}>
          <input type="text" class="task-review-text" id="taskText_${i}" value="${escapeHtml(t.text || '')}">
          <select id="taskProject_${i}">
            ${allProjects.map(pr => `<option value="${pr.id}" ${pr.id === (t.project_id || projectId) ? 'selected' : ''}>${escapeHtml(pr.name)}</option>`).join('')}
          </select>
          <select id="taskTrack_${i}">
            ${['productie','marketing','distributie','algemeen','taken'].map(tr => `<option value="${tr}" ${tr === (t.track || 'algemeen') ? 'selected' : ''}>${tr}</option>`).join('')}
          </select>
        </div>
      `).join('') || '<div class="state-msg">Geen taken gevonden in dit transcript.</div>'}
    </div>
    <div class="modal-actions"><button class="ghost" id="modalCancel">Sluiten</button><button class="primary" id="modalApply">Geselecteerde taken toevoegen</button></div>
  `);
  document.getElementById('modalCancel').onclick = closeModal;
  document.getElementById('modalApply').onclick = async () => {
    const btn = document.getElementById('modalApply');
    btn.disabled = true; btn.textContent = 'Bezig\u2026';
    let added = 0;
    for (let i = 0; i < tasks.length; i++) {
      const sel = document.getElementById('taskSel_' + i);

      const text = document.getElementById('taskText_' + i).value.trim();
      const targetProject = document.getElementById('taskProject_' + i).value;
      const track = document.getElementById('taskTrack_' + i).value;
      if (!text) continue;
      await addStep(targetProject, track, text, true);
      added++;
    }
    await sbUpdate('meeting_notes', 'id=eq.' + noteId, { status: 'applied' });
    closeModal();
    alert(added + ' taak/taken toegevoegd.');
    refreshProjectView(projectId);
  };
}

function trackRangeForProject(p, track, steps) {
  const dued = steps.filter(s => s.due_date).map(s => new Date(s.due_date));
  if (track === 'productie' || track === 'taken') {
    const start = p.start_date ? new Date(p.start_date) : null;
    const end = dued.length ? new Date(Math.min(...dued.map(d=>d.getTime()))) : (p.launch_date ? new Date(p.launch_date) : null);
    return { start, end: end || start };
  }
  const explicitStart = track === 'marketing' ? p.marketing_start_date : p.distributie_start_date;
  const start = explicitStart ? new Date(explicitStart) : (dued.length ? new Date(Math.min(...dued.map(d=>d.getTime()))) : null);
  const end = p.launch_date ? new Date(p.launch_date) : (dued.length ? new Date(Math.max(...dued.map(d=>d.getTime()))) : null);
  return { start, end };
}

function stepHtml(projectId, s, trackUnlocked) {
  const cls = s.status === 'done' ? 'done' : (trackUnlocked ? 'active' : 'locked');
  const clickable = trackUnlocked;
  const hasNote = !!(s.note && s.note.trim());
  const subtasks = Array.isArray(s.subtasks) ? s.subtasks : [];
  const images = Array.isArray(s.images) ? s.images : [];
  const allSubDone = subtasks.every(st => st.done);
  const blocked = s.status !== 'done' && subtasks.length > 0 && !allSubDone;
  const prio = s.priority || '';
  const hasLink = !!(s.link_url && s.link_url.trim());
  return `
    <div class="step ${cls} prio-${prio||'none'}" draggable="true" data-step-id="${s.id}">
      <div class="step-check ${blocked?'blocked':''}" ${clickable ? `onclick="toggleStepClick('${projectId}','${s.track}',${s.order_num})"` : ''} title="${blocked ? 'Rond eerst alle subtaken af' : ''}">${s.status === 'done' ? '\u2713' : ''}</div>
      <div class="step-main">
        <div class="step-name" id="stepname_${s.id}">${escapeHtml(s.step_name)}</div>
        ${s.due_date ? `<div class="step-due">${fmtDate(s.due_date)}</div>` : ''}
        ${hasLink ? `<a class="step-link-chip" href="${escapeHtml(s.link_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">\u{1F517} ${escapeHtml(s.link_url.replace(/^https?:\/\//,'').slice(0,40))}</a>` : ''}
        <div id="notewrap_${s.id}">${hasNote ? `<div class="step-note-text" onclick="startEditNote('${s.id}')">${escapeHtml(s.note)}</div>` : ''}</div>
        <div id="subtasks_${s.id}">${subtasks.length ? subtaskListHtml(projectId, s.id, subtasks) : ''}</div>

    <div class="step-thumb">
      <img src="${img.url}" onclick="window.open('${img.url}','_blank')" alt="${escapeHtml(img.name||'')}">

function triggerImageUpload(projectId, stepId) {
  if (!requireOwner()) return;
  document.getElementById('imgfile_' + stepId).click();
}
async function handleImageSelected(projectId, stepId) {
  if (!requireOwner()) return;
  const input = document.getElementById('imgfile_' + stepId);
  const file = input.files[0];
  if (!file) return;
  const { url: SB_URL, key: SB_KEY } = getConfig();
  const authToken = await getAuthToken();
  const filename = stepId + '_' + Date.now() + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  try {
    const uploadRes = await fetch(`${SB_URL}/storage/v1/object/step-images/${filename}`, {
      method: 'POST',
      headers: { apikey: SB_KEY, Authorization: 'Bearer ' + authToken, 'Content-Type': file.type },
      body: file
    });
    if (!uploadRes.ok) throw new Error('Upload mislukt (' + uploadRes.status + ')');
    const publicUrl = `${SB_URL}/storage/v1/object/public/step-images/${filename}`;
    const newImg = { id: uid('img'), url: publicUrl, name: file.name, path: filename };
    const row = (await sbSelect('project_steps', 'id=eq.' + stepId + '&select=images'))[0];
    const images = (row && Array.isArray(row.images)) ? row.images : [];
    images.push(newImg);
    await sbUpdate('project_steps', 'id=eq.' + stepId, { images });
    const wrap = document.getElementById('images_' + stepId);
    if (wrap.querySelector('.step-thumbs')) {
      wrap.querySelector('.step-thumbs').insertAdjacentHTML('beforeend', `
        <div class="step-thumb">
          <img src="${newImg.url}" onclick="window.open('${newImg.url}','_blank')" alt="${escapeHtml(newImg.name)}">
          <button class="step-thumb-del" onclick="deleteStepImage('${projectId}','${stepId}','${newImg.id}')">\u00d7</button>
        </div>`);
    } else {
      wrap.innerHTML = imageListHtml(projectId, stepId, images);
    }
  } catch (err) {
    alert('Kon afbeelding niet uploaden: ' + err.message);

}
async function deleteStepImage(projectId, stepId, imgId) {
  if (!requireOwner()) return;
  if (!confirm('Deze afbeelding verwijderen?')) return;
  try {
    const row = (await sbSelect('project_steps', 'id=eq.' + stepId + '&select=images'))[0];
    const images = (row && Array.isArray(row.images)) ? row.images : [];
    const target = images.find(i => i.id === imgId);
    const remaining = images.filter(i => i.id !== imgId);
    await sbUpdate('project_steps', 'id=eq.' + stepId, { images: remaining });
    if (target && target.path) {
      const { url: SB_URL, key: SB_KEY } = getConfig();
      const authToken = await getAuthToken();
      await fetch(`${SB_URL}/storage/v1/object/step-images/${target.path}`, { method: 'DELETE', headers: { apikey: SB_KEY, Authorization: 'Bearer ' + authToken } }).catch(()=>{});
    }
    document.getElementById('images_' + stepId).innerHTML = imageListHtml(projectId, stepId, remaining);
  } catch (err) {
    alert('Kon afbeelding niet verwijderen: ' + err.message);
  }
}

async function cyclePriority(projectId, stepId, current) {
  if (!requireOwner()) return;
  const order = ['', 'rood', 'oranje', 'groen'];
  const next = order[(order.indexOf(current) + 1) % order.length];
  await sbUpdate('project_steps', 'id=eq.' + stepId, { priority: next || null, reminder_pending: !!next, reminder_synced: false });
  const stepEl = document.querySelector(`[data-step-id="${stepId}"]`);
  if (stepEl) {
    ['prio-none','prio-rood','prio-oranje','prio-groen'].forEach(c => stepEl.classList.remove(c));
    stepEl.classList.add('prio-' + (next || 'none'));
    const flagBtn = stepEl.querySelector('.prio-flag');
    if (flagBtn) {
      ['prio-none','prio-rood','prio-oranje','prio-groen'].forEach(c => flagBtn.classList.remove(c));
      flagBtn.classList.add('prio-' + (next || 'none'));
      flagBtn.setAttribute('onclick', `cyclePriority('${projectId}','${stepId}','${next}')`);
    }
  }
}
async function promptStepLink(projectId, stepId, current) {
  if (!requireOwner()) return;
  let url = prompt('Link (URL) voor deze taak:', current || '');
  if (url === null) return;
  url = url.trim();
  if (url && !/^https?:\/\//i.test(url)) url = 'https://' + url;
  try {
    await sbUpdate('project_steps', 'id=eq.' + stepId, { link_url: url || null });
    refreshProjectView(projectId);
  } catch (err) {
    alert('Kon link niet opslaan: ' + err.message);
  }
}

// ---- Sleepbare lijsten (kolommen): volgorde verplaatsen, eigen lijsten toevoegen/verwijderen ----
function setupTracksDragDrop(listsEl, projectId) {
  if (!listsEl) return;
  let draggedKey = null;
  listsEl.querySelectorAll('.track-col[draggable="true"]').forEach(col => {
    col.addEventListener('dragstart', () => { draggedKey = col.dataset.trackKey; col.classList.add('dragging'); });
    col.addEventListener('dragend', () => { col.classList.remove('dragging'); listsEl.querySelectorAll('.track-col').forEach(c => c.classList.remove('drag-over')); });
    col.addEventListener('dragover', (e) => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', () => { col.classList.remove('drag-over'); });
    col.addEventListener('drop', async (e) => {
      e.preventDefault(); col.classList.remove('drag-over');
      const targetKey = col.dataset.trackKey;
      if (!draggedKey || draggedKey === targetKey) return;
      const cols = Array.from(listsEl.querySelectorAll('.track-col'));
      const draggedEl = cols.find(c => c.dataset.trackKey === draggedKey);
      if (!draggedEl) return;
      const targetIdx = cols.indexOf(col);
      listsEl.insertBefore(draggedEl, cols.indexOf(draggedEl) < targetIdx ? col.nextSibling : col);
      const newOrder = Array.from(listsEl.querySelectorAll('.track-col')).map(c => c.dataset.trackKey);
      try {
        await sbUpdate('projects', 'id=eq.' + projectId, { track_order: newOrder });
      } catch (err) {
        alert('Volgorde onthouden mislukt: ' + err.message);
      }
    });
  });
}
async function addTrackUI(projectId) {
  if (!requireOwner()) return;
  const name = prompt('Naam voor de nieuwe lijst:');
  if (!name || !name.trim()) return;
  try {
    const p = await sbSelect('projects', 'id=eq.' + projectId + '&select=custom_tracks,track_order').then(r => r[0]);
    const customTracks = Array.isArray(p.custom_tracks) ? p.custom_tracks.slice() : [];
    const newId = uid('track');
    customTracks.push({ id: newId, name: name.trim() });
    const trackOrder = Array.isArray(p.track_order) ? p.track_order.slice() : [];
    trackOrder.push(newId);
    await sbUpdate('projects', 'id=eq.' + projectId, { custom_tracks: customTracks, track_order: trackOrder });
    openProject(projectId);
  } catch (err) {
    alert('Lijst toevoegen mislukt: ' + err.message);
  }
}
async function removeTrackUI(projectId, trackKey) {
  if (!requireOwner()) return;
  const stepsInTrack = await sbSelect('project_steps', 'project_id=eq.' + projectId + '&track=eq.' + trackKey + '&select=id');
  const warn = stepsInTrack.length ? ` Taken in deze lijst (${stepsInTrack.length}) worden verplaatst naar "Algemeen"/"To-do's".` : '';
  if (!confirm('Deze lijst verwijderen?' + warn)) return;
  try {
    if (stepsInTrack.length) {
      const p = await sbSelect('projects', 'id=eq.' + projectId + '&select=type').then(r => r[0]);
      const fallbackTrack = p.type === 'overig' ? 'taken' : 'algemeen';
      for (const s of stepsInTrack) await sbUpdate('project_steps', 'id=eq.' + s.id, { track: fallbackTrack });
    }
    const proj = await sbSelect('projects', 'id=eq.' + projectId + '&select=custom_tracks,track_order').then(r => r[0]);
    const customTracks = (Array.isArray(proj.custom_tracks) ? proj.custom_tracks : []).filter(t => t.id !== trackKey);
    const trackOrder = (Array.isArray(proj.track_order) ? proj.track_order : []).filter(k => k !== trackKey);
    await sbUpdate('projects', 'id=eq.' + projectId, { custom_tracks: customTracks, track_order: trackOrder });
    openProject(projectId);
  } catch (err) {
    alert('Lijst verwijderen mislukt: ' + err.message);
  }
}

async function uploadProjectFile(projectId, file) {
  if (!requireOwner()) return;
  try {
    const { url: SB_URL, key: SB_KEY } = getConfig();
    const authToken = await getAuthToken();
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    const storageFilename = projectId + '_' + Date.now() + (ext ? '.' + ext : '');
    const uploadRes = await fetch(`${SB_URL}/storage/v1/object/project-files/${storageFilename}`, {
      method: 'POST', headers: { apikey: SB_KEY, Authorization: 'Bearer ' + authToken, 'Content-Type': file.type || 'application/octet-stream' }, body: file
    });
    if (!uploadRes.ok) throw new Error('Upload mislukt (' + uploadRes.status + ')');
    await sbInsert('project_files', [{ id: uid('file'), project_id: projectId, file_name: file.name, storage_path: storageFilename, file_type: file.type || null, size_bytes: file.size }]);
    const files = await sbSelect('project_files', 'project_id=eq.' + projectId + '&select=*&order=uploaded_at.desc');
    const listEl = document.getElementById('filelist_' + projectId);
    if (listEl) listEl.innerHTML = files.length ? files.map(f => fileRowHtml(projectId, f)).join('') : '<div class="file-empty">Nog geen bestanden</div>';
  } catch (err) {
    alert('Bestand uploaden mislukt: ' + err.message);

async function deleteProjectFile(fileId, projectId) {
  if (!requireOwner()) return;
  if (!confirm('Dit bestand verwijderen?')) return;
  try {
    const row = (await sbSelect('project_files', 'id=eq.' + fileId + '&select=storage_path'))[0];
    await sbDelete('project_files', 'id=eq.' + fileId);
    if (row && row.storage_path) {
      const { url: SB_URL, key: SB_KEY } = getConfig();
      const authToken = await getAuthToken();
      await fetch(`${SB_URL}/storage/v1/object/project-files/${row.storage_path}`, { method: 'DELETE', headers: { apikey: SB_KEY, Authorization: 'Bearer ' + authToken } }).catch(()=>{});
    }
    const files = await sbSelect('project_files', 'project_id=eq.' + projectId + '&select=*&order=uploaded_at.desc');
    const listEl = document.getElementById('filelist_' + projectId);
    if (listEl) listEl.innerHTML = files.length ? files.map(f => fileRowHtml(projectId, f)).join('') : '<div class="file-empty">Nog geen bestanden</div>';

function openProjectFile(storagePath, fileName) {
  const { url: SB_URL } = getConfig();
  const fileUrl = `${SB_URL}/storage/v1/object/public/project-files/${storagePath}`;
  const ext = (fileName.split('.').pop() || '').toLowerCase();
  const nativelyViewable = ['pdf','png','jpg','jpeg','gif','webp','svg','txt','md'].includes(ext);
  const viewerSrc = nativelyViewable ? fileUrl : `https://docs.google.com/gview?embedded=true&url=${encodeURIComponent(fileUrl)}`;
  const backdrop = document.createElement('div');
  backdrop.className = 'file-viewer-backdrop';
  backdrop.innerHTML = `
    <div class="file-viewer-bar">
      <span>${escapeHtml(fileName)}</span>
      <button class="ghost" id="fileViewerClose">\u2715 Sluiten</button>
    </div>
    <iframe class="file-viewer-frame" src="${viewerSrc}"></iframe>
  `;
  document.body.appendChild(backdrop);
  document.getElementById('fileViewerClose').onclick = () => backdrop.remove();
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) backdrop.remove(); });
}

let lastCompletedStep = null;

function toggleStepClick(projectId, track, order) {
  if (!requireOwner()) return;
  const stepId = projectId + '_' + track + '_' + order;
  const el = document.querySelector(`[data-step-id="${stepId}"]`);
  if (!el) return;
  if (el.classList.contains('done')) { uncompleteStep(projectId, track, order); return; }
  const subtasksEl = document.getElementById('subtasks_' + stepId);
  const hasIncomplete = subtasksEl && subtasksEl.querySelector('.subtask:not(.done)');
  if (hasIncomplete) {
    el.querySelector('.step-check').animate([{transform:'translateX(0)'},{transform:'translateX(-3px)'},{transform:'translateX(3px)'},{transform:'translateX(0)'}], {duration:250});
    return;
  }
  completeStep(projectId, track, order);
}

async function completeStep(projectId, track, order) {
  const stepId = projectId + '_' + track + '_' + order;
  const el = document.querySelector(`[data-step-id="${stepId}"]`);
  if (el) {
    el.classList.add('fading');
    setTimeout(() => {
      el.classList.remove('active');
      el.classList.add('done');
      const chk = el.querySelector('.step-check');
      if (chk) chk.textContent = '\u2713';
      el.parentNode.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('fading')));
    }, 220);
  }
  lastCompletedStep = { projectId, track, order };
  try {
    await markStepDone(projectId, track, order);
    if (track === 'productie' && (order === 4 || order === 5)) refreshProjectView(projectId);
  } catch (err) {
    alert('Kon stap niet afronden: ' + err.message);
    refreshProjectView(projectId);
  }
}

async function uncompleteStep(projectId, track, order) {
  const stepId = projectId + '_' + track + '_' + order;
  const el = document.querySelector(`[data-step-id="${stepId}"]`);
  if (el) {
    el.classList.add('fading');
    setTimeout(() => {
      el.classList.remove('done');
      el.classList.add('active');
      const chk = el.querySelector('.step-check');
      if (chk) chk.textContent = '';
      const list = el.parentNode;
      const firstDone = Array.from(list.children).find(c => c !== el && c.classList.contains('done'));
      if (firstDone) list.insertBefore(el, firstDone); else list.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('fading')));
    }, 220);
  }
  if (lastCompletedStep && lastCompletedStep.projectId === projectId && lastCompletedStep.track === track && lastCompletedStep.order === order) lastCompletedStep = null;
  try { await sbUpdate('project_steps', 'id=eq.' + stepId, { status: 'pending', completed_date: null }); }
  catch (err) { alert('Ongedaan maken mislukt: ' + err.message); refreshProjectView(projectId); }
}

document.addEventListener('keydown', (e) => {
  const tag = document.activeElement ? document.activeElement.tagName : '';
  const isEditable = (document.activeElement && document.activeElement.isContentEditable) || tag === 'INPUT' || tag === 'TEXTAREA';
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z' && !isEditable && lastCompletedStep) {
    e.preventDefault();
    const { projectId, track, order } = lastCompletedStep;
    lastCompletedStep = null;
    uncompleteStep(projectId, track, order);
  }
});

function startRenameStep(stepId) {

  el.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); el.blur(); } };
}
function startEditNote(stepId) {

  const ta = document.getElementById('noteinput_' + stepId);

function subtaskRowHtml(projectId, stepId, st) {
  return `<div class="subtask ${st.done?'done':''}" data-sub-id="${st.id}">
    <div class="subtask-check" onclick="toggleSubtask('${projectId}','${stepId}','${st.id}')">${st.done?'\u2713':''}</div>
    <span class="subtask-text" onclick="toggleSubtask('${projectId}','${stepId}','${st.id}')">${escapeHtml(st.text)}</span>
    <button class="subtask-del" onclick="deleteSubtask('${projectId}','${stepId}','${st.id}')">\u00d7</button>

async function getStepSubtasks(stepId) {
  const row = (await sbSelect('project_steps', 'id=eq.' + stepId + '&select=subtasks'))[0];
  return (row && Array.isArray(row.subtasks)) ? row.subtasks : [];
}
async function addSubtask(projectId, stepId) {
  if (!requireOwner()) return;
  const input = document.getElementById('subtaskadd_' + stepId);
  const text = input.value.trim(); if (!text) return;
  const newSub = { id: uid('sub'), text, done: false };
  const wrap = document.getElementById('subtasks_' + stepId);
  const addRow = input.closest('.subtask-add-row');
  let list = wrap.querySelector('.subtask-list');
  if (!list) { wrap.insertAdjacentHTML('afterbegin', '<div class="subtask-list"></div>'); list = wrap.querySelector('.subtask-list'); }
  list.insertAdjacentHTML('beforeend', subtaskRowHtml(projectId, stepId, newSub));
  if (addRow) addRow.remove();
  try {
    const subtasks = await getStepSubtasks(stepId);
    subtasks.push(newSub);
    await sbUpdate('project_steps', 'id=eq.' + stepId, { subtasks });
  } catch (err) { alert('Kon subtaak niet toevoegen: ' + err.message); }
}
async function toggleSubtask(projectId, stepId, subId) {
  if (!requireOwner()) return;
  const el = document.querySelector(`#subtasks_${stepId} .subtask[data-sub-id="${subId}"]`);
  let willBeDone = true;
  if (el) {
    willBeDone = !el.classList.contains('done');
    el.classList.toggle('done', willBeDone);
    el.querySelector('.subtask-check').textContent = willBeDone ? '\u2713' : '';
  }
  try {
    const subtasks = await getStepSubtasks(stepId);
    const st = subtasks.find(s => s.id === subId);
    if (st) st.done = willBeDone;
    await sbUpdate('project_steps', 'id=eq.' + stepId, { subtasks });
  } catch (err) { alert('Kon subtaak niet bijwerken: ' + err.message); }
}
async function deleteSubtask(projectId, stepId, subId) {
  if (!requireOwner()) return;
  const el = document.querySelector(`#subtasks_${stepId} .subtask[data-sub-id="${subId}"]`);
  if (el) el.remove();
  try {
    const subtasks = (await getStepSubtasks(stepId)).filter(s => s.id !== subId);
    await sbUpdate('project_steps', 'id=eq.' + stepId, { subtasks });
  } catch (err) { alert('Kon subtaak niet verwijderen: ' + err.message); }
}

async function deleteStepUI(projectId, stepId) {
  if (!requireOwner()) return; if (!confirm('Deze stap verwijderen?')) return; await deleteStep(stepId); refreshProjectView(projectId); }
async function addStepUI(projectId, track) {
  if (!requireOwner()) return;
  const input = document.getElementById('addstep_' + track);
  const name = input.value.trim(); if (!name) return;
  input.disabled = true;
  try {
    const newStep = await addStep(projectId, track, name);
    const listEl = document.getElementById('steplist_' + track);
    listEl.insertAdjacentHTML('beforeend', stepHtml(projectId, newStep, true));
    input.value = '';
  } catch (err) {
    alert('Kon taak niet toevoegen: ' + err.message);
  } finally {
    input.disabled = false;
    input.focus();
  }
}
async function submitBenchmark(checkId, projectId) {
  const val = document.getElementById('bmInput_' + checkId).value; if (!val) return;
  await updateBenchmark(checkId, Number(val)); refreshProjectView(projectId);
}

function setupDragDrop(listEl) {
  if (!listEl || listEl.__dragWired) return;
  listEl.__dragWired = true;
  let draggedId = null;
  listEl.addEventListener('dragstart', (e) => {
    if (!isOwner) { e.preventDefault(); return; }
    const stepEl = e.target.closest('.step');
    if (!stepEl) return;
    draggedId = stepEl.dataset.stepId;
    stepEl.classList.add('dragging');
  });
  listEl.addEventListener('dragend', (e) => {
    const stepEl = e.target.closest('.step');
    if (stepEl) stepEl.classList.remove('dragging');
    listEl.querySelectorAll('.step').forEach(s => s.classList.remove('drag-over'));
  });
  listEl.addEventListener('dragover', (e) => {
    const stepEl = e.target.closest('.step');
    if (!stepEl) return;
    e.preventDefault();
    stepEl.classList.add('drag-over');
  });
  listEl.addEventListener('dragleave', (e) => {
    const stepEl = e.target.closest('.step');
    if (stepEl) stepEl.classList.remove('drag-over');
  });
  listEl.addEventListener('drop', async (e) => {
    const stepEl = e.target.closest('.step');
    if (!stepEl) return;
    e.preventDefault(); stepEl.classList.remove('drag-over');
    const targetId = stepEl.dataset.stepId;
    if (!draggedId || draggedId === targetId) return;
    const items = Array.from(listEl.querySelectorAll('.step'));
    const draggedEl = items.find(i => i.dataset.stepId === draggedId);
    if (!draggedEl) return;
    const targetIdx = items.indexOf(stepEl);
    listEl.insertBefore(draggedEl, items.indexOf(draggedEl) < targetIdx ? stepEl.nextSibling : stepEl);
    const orderedIds = Array.from(listEl.querySelectorAll('.step')).map(s => s.dataset.stepId);
    const projectId = listEl.dataset.project, track = listEl.dataset.track;
    try { await reorderSteps(projectId, track, orderedIds); refreshProjectView(projectId); }
    catch (err) { alert('Herordenen mislukt: ' + err.message); refreshProjectView(projectId); }
  });
}
function closeProject(fromHistory) {
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('liveShowsView').classList.add('hidden');
  document.getElementById('showDetailView').classList.add('hidden');
  document.getElementById('homeView').classList.remove('hidden');
  document.getElementById('navLiveShows').classList.remove('active');
  document.getElementById('navHome').classList.add('active');
  if (!fromHistory && window.location.search) {
    history.pushState({ view: 'home' }, '', window.location.pathname);
  }
  loadHome();
}

// ================= Init =================
document.getElementById('authBtn').onclick = handleAuthClick;
initAuthState();
document.getElementById('newProjectBtn').onclick = showNewProjectModal;
document.getElementById('homeLink').onclick = () => goHome();
document.getElementById('navHome').onclick = () => showHomeFromNav();
document.getElementById('navLiveShows').onclick = () => showLiveShowsView();
document.getElementById('navHome').classList.add('active');

// Maandagochtend-herinnering: alleen zichtbaar als de tool op dat moment open staat
// (geen echte pushmelding - dit is een pop-up binnen de pagina zelf).
function checkMondayReminder() {
  const now = new Date();
  if (now.getDay() !== 1 || now.getHours() < 10) return;
  const todayKey = 'mondayReminderShown_' + now.toISOString().slice(0,10);
  if (localStorage.getItem(todayKey)) return;
  localStorage.setItem(todayKey, '1');
  renderModal(`
    <h2>\u{1F4C5} Maandagochtend-check</h2>
    <div class="hint">Tijd om de wekelijkse Springcast/YouTube-cijfers bij te werken. Open Springcast, en zeg tegen Claude "update de weekcijfers" \u2014 dan vult die per lopende podcast alleen de ontbrekende week aan.</div>
    <div class="modal-actions"><button class="primary" id="modalCancel">Begrepen</button></div>
  `);
  document.getElementById('modalCancel').onclick = closeModal;
}
checkMondayReminder();
setInterval(checkMondayReminder, 10 * 60 * 1000);

function parseRouteFromUrl() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('share')) return { view: 'shared', id: params.get('share') };
  if (params.get('showshare')) return { view: 'showshared', id: params.get('showshare') };
  if (params.get('project')) return { view: 'project', id: params.get('project') };
  if (params.get('show')) return { view: 'show', id: params.get('show') };
  if (params.get('view') === 'shows') return { view: 'shows' };
  return { view: 'home' };
}

window.addEventListener('popstate', (e) => {
  const route = e.state || parseRouteFromUrl();
  if (route.view === 'project' && route.id) openProject(route.id, false, true);
  else if (route.view === 'show' && route.id) openShow(route.id, true);
  else if (route.view === 'shows') showLiveShowsView(true);
  else closeProject(true);
});

const __initialRoute = parseRouteFromUrl();
if (__initialRoute.view === 'shared') {
  document.getElementById('newProjectBtn').style.display = 'none';
  document.querySelector('.top-nav').style.display = 'none';
  document.getElementById('homeLink').style.cursor = 'default';
  document.getElementById('homeLink').onclick = null;
  history.replaceState({ view: 'shared', id: __initialRoute.id }, '');
  openProject(__initialRoute.id, true);
} else if (__initialRoute.view === 'showshared') {
  document.getElementById('newProjectBtn').style.display = 'none';
  document.querySelector('.top-nav').style.display = 'none';
  document.getElementById('homeLink').style.cursor = 'default';
  document.getElementById('homeLink').onclick = null;
  history.replaceState({ view: 'showshared', id: __initialRoute.id }, '');
  openShow(__initialRoute.id, true, true);
} else if (__initialRoute.view === 'project') {
  history.replaceState({ view: 'project', id: __initialRoute.id }, '');
  openProject(__initialRoute.id, false, true);
} else if (__initialRoute.view === 'show') {
  history.replaceState({ view: 'show', id: __initialRoute.id }, '');
  openShow(__initialRoute.id, true);
} else if (__initialRoute.view === 'shows') {
  history.replaceState({ view: 'shows' }, '');
  showLiveShowsView(true);
} else {
  history.replaceState({ view: 'home' }, '', window.location.pathname);
  loadHome();
}
</script>
